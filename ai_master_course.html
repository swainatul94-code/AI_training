<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Zero → Hero · Interactive Course + Games</title>
<style>
:root{
  --bg:#0b0f17; --panel:#121826; --panel2:#1a2233; --panel3:#222c44;
  --ink:#e6ecf5; --muted:#a3b0c7; --dim:#a3b0c7;
  --accent:#7aa2ff; --accent2:#9d7aff; --gold:#ffd166;
  --ok:#3ecf8e; --warn:#ffb547; --err:#ff6b6b; --info:#7ad4ff;
  --code:#0f1422; --border:#23304a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.55}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip-link{position:absolute;left:-9999px;top:0;background:var(--accent);color:#0b0f17;padding:8px 12px;border-radius:4px;font-weight:700}
.skip-link:focus{left:8px;top:8px;z-index:100}
/* layout */
.app{display:flex;flex-direction:column;min-height:100vh}
header.topbar{background:linear-gradient(90deg,#0e1422,#141b2f);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
header .brand{font-weight:700;font-size:16px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .stats{display:flex;gap:14px;flex-wrap:wrap;align-items:center;flex:1}
header .stat{font-size:12px;color:var(--muted);background:var(--panel2);padding:6px 10px;border-radius:99px;border:1px solid var(--border);white-space:nowrap}
header .stat b{color:var(--ink);font-weight:600;margin-left:4px}
header .xp-bar{flex:1;min-width:160px;max-width:300px;height:10px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
header .xp-bar > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .4s}
header .lvl{font-size:12px;color:var(--gold);font-weight:700}
.body{display:grid;grid-template-columns:280px 1fr;flex:1}
aside{background:var(--panel);border-right:1px solid var(--border);padding:14px;height:calc(100vh - 56px);position:sticky;top:56px;overflow-y:auto}
aside nav.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
aside nav.tabs button{flex:1;min-width:60px;background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px;font-size:12px;cursor:pointer}
aside nav.tabs button.active{background:var(--accent);color:#0b0f17;border-color:var(--accent);font-weight:600}
aside .item{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--ink);padding:8px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;font-size:13px}
aside .item:hover{background:var(--panel2)}
aside .item.active{background:var(--panel2);border-color:var(--accent)}
aside .item .badge{font-size:10px;padding:2px 6px;border-radius:99px;background:#2a3550;color:var(--muted);white-space:nowrap}
aside .item .badge.done{background:var(--ok);color:#0b0f17}
aside .item .badge.locked{background:#3a2a2a;color:#aa6a6a}
aside .tools{margin-top:14px;display:flex;gap:6px;flex-wrap:wrap}
aside button.tool{background:var(--panel2);color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px;cursor:pointer}
aside button.tool:hover{background:#243049}
main{padding:28px 40px;max-width:1100px;width:100%}
h2{margin:0 0 8px;font-size:26px}
h3{margin-top:24px;font-size:18px;color:var(--accent)}
h4{font-size:15px;margin-top:14px;color:var(--accent2)}
p{margin:6px 0}
code,pre,kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
code{background:var(--code);padding:1px 6px;border-radius:4px;font-size:13px;color:#e8d27a}
pre{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:14px;overflow:auto;font-size:13px;line-height:1.45;position:relative}
pre .copy{position:absolute;top:6px;right:6px;background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin:12px 0}
.tag{display:inline-block;padding:2px 8px;border-radius:99px;background:var(--panel2);color:var(--muted);font-size:11px;margin-right:6px}
.tag.gold{background:rgba(255,209,102,.12);color:var(--gold);border:1px solid var(--gold)}
ul.checks{list-style:none;padding:0}
ul.checks li{padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.quiz{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:16px;margin:12px 0}
.quiz .q{font-weight:600;margin-bottom:8px}
.quiz .options label{display:block;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin:4px 0;cursor:pointer}
.quiz .options label:hover{border-color:var(--accent)}
.quiz .options input{margin-right:8px}
.quiz textarea{width:100%;min-height:80px;background:var(--code);border:1px solid var(--border);color:var(--ink);border-radius:6px;padding:8px;font-family:inherit;font-size:14px}
.quiz .actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.quiz button{background:var(--accent);color:#0b0f17;border:none;border-radius:6px;padding:7px 12px;font-weight:600;cursor:pointer;font-size:13px}
.quiz button.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.quiz .feedback{margin-top:8px;padding:10px;border-radius:6px;font-size:13px}
.quiz .feedback.ok{background:rgba(62,207,142,.12);border:1px solid var(--ok)}
.quiz .feedback.bad{background:rgba(255,107,107,.10);border:1px solid var(--err)}
.quiz .feedback.info{background:rgba(122,162,255,.10);border:1px solid var(--accent)}
.scorebar{height:10px;background:var(--panel);border-radius:6px;overflow:hidden;margin-top:6px}
.scorebar > div{height:100%;background:var(--ok)}
.lesson-toc{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 20px}
.lesson-toc a{background:var(--panel2);border:1px solid var(--border);padding:4px 10px;border-radius:99px;font-size:12px;color:var(--ink)}
.callout{border-left:4px solid var(--accent);padding:8px 14px;background:rgba(122,162,255,.07);border-radius:0 8px 8px 0;margin:10px 0}
.callout.warn{border-color:var(--warn);background:rgba(255,181,71,.08)}
.callout.tester{border-color:var(--gold);background:rgba(255,209,102,.07)}
.formula{background:var(--code);padding:8px;border-radius:6px;font-family:ui-monospace,monospace;font-size:14px;display:block;margin:6px 0;color:#e8d27a;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
th,td{border:1px solid var(--border);padding:6px 10px;text-align:left}
th{background:var(--panel2)}
hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.nav-bottom{display:flex;justify-content:space-between;margin-top:30px;padding-top:14px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}
.nav-bottom button{background:var(--panel2);color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:9px 14px;cursor:pointer;font-size:13px}
.nav-bottom .complete{background:var(--ok);color:#0b0f17;font-weight:700;border:none}
.nav-bottom .complete[disabled]{background:var(--panel2);color:var(--muted);cursor:not-allowed}
.xp-pop{position:fixed;right:20px;bottom:20px;background:var(--gold);color:#0b0f17;padding:8px 14px;border-radius:99px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.4);transform:translateY(20px);opacity:0;transition:all .3s;z-index:50}
.xp-pop.show{transform:translateY(0);opacity:1}
/* games */
.game-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin:12px 0;cursor:pointer;transition:border-color .2s}
.game-card:hover{border-color:var(--accent)}
.game-card h3{margin-top:0}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.match-board{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.match-col{display:flex;flex-direction:column;gap:6px}
.match-item{background:var(--panel2);border:1px solid var(--border);padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
.match-item:hover{border-color:var(--accent)}
.match-item.selected{border-color:var(--accent);background:rgba(122,162,255,.12)}
.match-item.matched{background:rgba(62,207,142,.15);border-color:var(--ok);cursor:default;opacity:.7}
.match-item.wrong{background:rgba(255,107,107,.15);border-color:var(--err);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.order-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.order-item{background:var(--panel2);border:1px solid var(--border);padding:8px 10px;border-radius:6px;cursor:grab;font-size:13px;display:flex;align-items:center;gap:10px}
.order-item.dragging{opacity:.4}
.order-item .num{background:var(--accent);color:#0b0f17;border-radius:99px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.order-item.correct{background:rgba(62,207,142,.12);border-color:var(--ok)}
.order-item.wrong{background:rgba(255,107,107,.12);border-color:var(--err)}
.flash-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center;margin:14px 0;min-height:160px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.flash-card .q{font-size:18px;margin-bottom:14px}
.flash-card .opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:500px}
.flash-card .opts button{background:var(--panel);border:1px solid var(--border);color:var(--ink);padding:10px;border-radius:6px;cursor:pointer;font-size:13px}
.flash-card .opts button:hover{border-color:var(--accent)}
.flash-card .opts button.right{background:var(--ok);color:#0b0f17;border-color:var(--ok)}
.flash-card .opts button.wrong{background:var(--err);color:#0b0f17;border-color:var(--err)}
.token-lab input{width:100%;background:var(--code);border:1px solid var(--border);color:var(--ink);border-radius:6px;padding:10px;font-size:14px;margin-bottom:10px}
.token-out{display:flex;flex-wrap:wrap;gap:4px;padding:10px;background:var(--code);border-radius:6px;border:1px solid var(--border);min-height:60px}
.token{padding:3px 8px;border-radius:4px;font-family:ui-monospace,monospace;font-size:12px;border:1px solid}
.attn-grid{display:grid;gap:2px;margin:14px 0}
.attn-cell{padding:6px;text-align:center;border-radius:4px;font-size:11px;font-family:ui-monospace,monospace}
.bar{height:18px;border-radius:4px;background:var(--accent);margin:2px 0}
.bar-row{display:grid;grid-template-columns:80px 1fr 60px;gap:8px;align-items:center;font-size:12px;margin:4px 0}
/* portfolio */
.portfolio-row{display:grid;grid-template-columns:160px 1fr 1fr 1fr 60px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.portfolio-row input{background:var(--code);border:1px solid var(--border);color:var(--ink);border-radius:4px;padding:6px;font-size:12px;width:100%}
.portfolio-row .label{color:var(--muted)}
.portfolio-row .check{background:var(--ok);color:#0b0f17;border:none;border-radius:4px;padding:6px 10px;cursor:pointer;font-weight:600;font-size:11px}
.portfolio-row .check.unchecked{background:var(--panel2);color:var(--muted)}
/* badges */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:12px}
.badge-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;opacity:.4;transition:all .2s}
.badge-card.earned{opacity:1;border-color:var(--gold);background:linear-gradient(180deg,var(--panel),rgba(255,209,102,.08))}
.badge-card .icon{font-size:38px;margin-bottom:6px}
.badge-card h4{margin:4px 0;color:var(--gold)}
.badge-card p{font-size:11px;color:var(--muted);margin:0}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:10px 0}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.kpi .v{font-size:26px;font-weight:700;color:var(--accent)}
.kpi .l{font-size:11px;color:var(--muted);margin-top:4px}
@media(max-width:900px){.body{grid-template-columns:1fr}aside{position:relative;height:auto;top:0}main{padding:18px}header.topbar{padding:8px}header .xp-bar{order:5;width:100%;flex:none}.match-board{grid-template-columns:1fr}.portfolio-row{grid-template-columns:1fr;gap:4px}.flash-card .opts{grid-template-columns:1fr}}
/* inline interactives */
details.try{background:rgba(255,209,102,.07);border:1px solid var(--gold);border-radius:8px;padding:10px 14px;margin:10px 0}
details.try summary{cursor:pointer;font-weight:600;color:var(--gold);outline:none}
details.try summary:hover{color:#ffe28a}
details.try[open] summary{margin-bottom:8px}
details.try .ans{background:var(--code);padding:10px;border-radius:6px;border:1px solid var(--border);color:var(--ink);font-size:13px;margin-top:6px}
.tryq{background:rgba(122,162,255,.06);border-left:4px solid var(--accent);padding:10px 14px;margin:10px 0;border-radius:0 8px 8px 0}
.tryq b{color:var(--accent)}
.mistake{background:rgba(255,107,107,.06);border-left:4px solid var(--err);padding:10px 14px;margin:10px 0;border-radius:0 8px 8px 0}
.mistake b{color:var(--err)}
.trap{background:linear-gradient(90deg,rgba(255,107,107,.08),rgba(62,207,142,.08));border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:12px 0}
.trap .wrong{color:var(--err);font-weight:600}
.trap .right{color:var(--ok);font-weight:600;margin-top:6px}
.trap .why{color:var(--muted);font-size:13px;margin-top:6px}
.interview{background:rgba(157,122,255,.06);border-left:4px solid var(--accent2);padding:10px 14px;margin:10px 0;border-radius:0 8px 8px 0}
.interview b{color:var(--accent2)}
.minilab{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 0}
.minilab label{display:block;margin:6px 0;font-size:13px}
.minilab input[type=number]{background:var(--code);border:1px solid var(--border);color:var(--ink);padding:6px;border-radius:4px;width:90px}
.minilab .out{margin-top:10px;padding:10px;background:var(--code);border-radius:6px;border:1px solid var(--border);font-family:ui-monospace,monospace;font-size:13px}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div class="app">
<header class="topbar" role="banner">
  <div class="brand" aria-hidden="true">⚡ AI Zero → Hero</div>
  <div class="stats" role="group" aria-label="Player stats">
    <div class="stat lvl" aria-label="Level">Lv <b id="level">1</b></div>
    <div class="xp-bar" role="progressbar" aria-label="XP progress to next level" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="xp-bar"><div id="xp-bar-fill"></div></div>
    <div class="stat" aria-label="XP this level">XP <b id="xp">0</b> / <b id="xp-next">500</b></div>
    <div class="stat" aria-label="Day streak">🔥 Streak <b id="streak">0</b></div>
    <div class="stat" aria-label="Badges earned">🏆 Badges <b id="badge-count">0</b>/<b id="badge-total">0</b></div>
  </div>
</header>
<div class="body">
  <aside>
    <nav class="tabs">
      <button data-view="phases" class="active" onclick="switchView('phases')">Phases</button>
      <button data-view="games" onclick="switchView('games')">Games</button>
      <button data-view="portfolio" onclick="switchView('portfolio')">Portfolio</button>
      <button data-view="badges" onclick="switchView('badges')">Badges</button>
    </nav>
    <div id="sidebar-content"></div>
    <div class="tools">
      <button class="tool" onclick="exportProgress()">Export</button>
      <button class="tool" onclick="document.getElementById('import-file').click()">Import</button>
      <input id="import-file" type="file" accept="application/json" style="display:none" onchange="importProgress(event)">
      <button class="tool" onclick="resetProgress()">Reset</button>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--muted)">Progress auto-saves to browser. Export JSON for backup.</div>
  </aside>
  <main id="main" role="main"></main>
</div>
</div>
<div id="main-content" tabindex="-1" class="sr-only">main content landmark</div>
<div class="xp-pop" id="xp-pop" role="status" aria-live="polite"></div>
<div id="modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:22px;max-width:440px;width:92%">
    <h3 id="modal-title" style="margin-top:0">Confirm</h3>
    <p id="modal-body" style="color:var(--ink)"></p>
    <div id="modal-extra"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button id="modal-cancel" style="background:var(--panel2);color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer">Cancel</button>
      <button id="modal-ok" style="background:var(--accent);color:#0b0f17;border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-weight:600">OK</button>
    </div>
  </div>
</div>

<script>
/* ============================== COURSE DATA ============================== */
const COURSE = [
{ id:0, title:"Phase 0 — Setup", est:"1-2 hrs",
  intro:"Bad env kills learning. By end: Python, Claude API key, GitHub repo, working <code>test_claude.py</code>. Don't skip the explanations — they teach concepts you'll be quizzed on.",
  lessons:[
    {h:"What you're installing and why (read first)", body:`<p>Five tools. Each has a job:</p>
    <table>
      <tr><th>Tool</th><th>What it does</th><th>Why you need it</th></tr>
      <tr><td><b>Python</b></td><td>Programming language interpreter</td><td>Every ML library is Python. Without it, no ML.</td></tr>
      <tr><td><b>uv</b></td><td>Package manager (downloads libraries)</td><td>Faster + cleaner than pip. Installs things like <code>anthropic</code>, <code>numpy</code>.</td></tr>
      <tr><td><b>Git</b></td><td>Version control — tracks every change to your code</td><td>Industry standard. Lets you push code to GitHub for backup + portfolio.</td></tr>
      <tr><td><b>VS Code</b></td><td>Text editor for code</td><td>Where you write Python files. Free, popular.</td></tr>
      <tr><td><b>Anthropic API key</b></td><td>Password that lets your code call Claude</td><td>Required to use Claude's API. Costs pennies per request.</td></tr>
    </table>
    <p><b>Mental model:</b> Python is the engine. uv buys parts (libraries). Git photographs your work. VS Code is the workbench. The API key opens the door to Claude.</p>`},
    {h:"Install Python (Windows)", body:`<p><b>What is Python?</b> A programming language. You write <code>.py</code> files and Python runs them. It comes with a command called <code>python</code> that you call from PowerShell.</p>
    <p><b>Steps:</b></p>
    <ol>
      <li>Go to <a href="https://python.org/downloads" target="_blank">python.org/downloads</a></li>
      <li>Download installer (latest 3.11 or newer)</li>
      <li>Run installer. <b>CRITICAL: check the box "Add Python to PATH"</b> at bottom of first screen. Without this, PowerShell won't find Python.</li>
      <li>Click "Install Now"</li>
      <li>Open PowerShell (Windows key → type "powershell" → Enter)</li>
      <li>Run the command below to verify it worked</li>
    </ol>
    <p><b>PATH = a list of folders Windows searches when you type a command.</b> Adding Python to PATH means typing <code>python</code> anywhere works.</p>`, code:`python --version
# Should print: Python 3.11.x (or higher)
# If you see "not recognized" → PATH wasn't checked. Reinstall.`},
    {h:"Install uv (fast Python package manager)", body:`<p><b>What is a package manager?</b> Software that downloads + installs libraries (other people's reusable code). Python ships with <code>pip</code>; <code>uv</code> is a faster modern replacement made by Astral.</p>
    <p><b>Why we use it:</b> ML projects pull in 20-50 libraries (numpy, torch, anthropic, ...). uv installs them in seconds instead of minutes. Also handles virtual environments cleanly.</p>
    <p><b>Virtual environment</b> = isolated Python "workspace" so libraries for one project don't conflict with another. Like separate desks.</p>`, code:`pip install uv
uv --version
# Should print: uv 0.x.x`},
    {h:"Install Git", body:`<p><b>What is Git?</b> Software that tracks every change you make to your code. Lets you:</p>
    <ul>
      <li>Undo any change (like Ctrl+Z but forever)</li>
      <li>Sync your code to GitHub (cloud backup + share)</li>
      <li>Collaborate without overwriting each other's work</li>
    </ul>
    <p><b>How it works (mental model):</b> You write code → run <code>git add</code> (stage changes) → <code>git commit -m "msg"</code> (save snapshot with message) → <code>git push</code> (upload snapshots to GitHub).</p>
    <p>Download installer at <a href="https://git-scm.com" target="_blank">git-scm.com</a>. Accept defaults. Verify:</p>`, code:`git --version
# Should print: git version 2.x.x`},
    {h:"Install VS Code (your editor)", body:`<p><b>What it is:</b> a free text editor optimized for code. Color-codes syntax, suggests completions, runs your code with one click.</p>
    <ol>
      <li>Download at <a href="https://code.visualstudio.com" target="_blank">code.visualstudio.com</a></li>
      <li>Install with defaults</li>
      <li>Open it, click Extensions icon (left sidebar, looks like 4 squares)</li>
      <li>Search "Python" → install the official Microsoft one</li>
      <li>Search "Jupyter" → install</li>
    </ol>
    <p>When you open a <code>.py</code> file, VS Code auto-detects Python and offers to run it (▶ button top-right).</p>`},
    {h:"Get an Anthropic API key", body:`<p><b>What is an API key?</b> A long secret string (like a password) that proves your code is authorized to call Claude. Anthropic uses it to know who to bill.</p>
    <p><b>Cost:</b> tiny. A test call is ~$0.001. $5 lasts weeks of learning. Set a spend limit in console to avoid runaway bills.</p>
    <ol>
      <li>Go to <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>, sign up (Google login OK)</li>
      <li>Billing → add $5-10 credit (credit card)</li>
      <li>Settings → Limits → set monthly cap (e.g. $20)</li>
      <li>API Keys → "Create Key" → copy the string (starts with <code>sk-ant-...</code>) — <b>save it now, you can't view it again later</b></li>
    </ol>
    <p><b>Why we use <code>setx</code> instead of <code>$env:VAR = "..."</code>:</b></p>
    <ul>
      <li><code>$env:ANTHROPIC_API_KEY = "..."</code> sets the variable <b>only in the current PowerShell window</b>. Close window → gone.</li>
      <li><code>setx ANTHROPIC_API_KEY "..."</code> writes it to <b>Windows registry</b> (HKCU\\Environment) → every future PowerShell inherits it.</li>
      <li>After <code>setx</code>, you MUST close + reopen PowerShell. The current window doesn't see the change.</li>
    </ul>
    <p>This is why the course quiz asks about setx. It's a real footgun.</p>`, code:`setx ANTHROPIC_API_KEY "sk-ant-..."
# CLOSE this PowerShell window
# Open a NEW PowerShell window
echo $env:ANTHROPIC_API_KEY
# Should print your key. If empty → you forgot to close+reopen.`},
    {h:"Your first Claude API call (explained line by line)", body:`<p>Open VS Code → File → New File → save as <code>test_claude.py</code> in any folder. Paste the code below.</p>
    <p><b>What each line does:</b></p>
    <ul>
      <li><code>import anthropic</code> — load the Anthropic library (we install it next step)</li>
      <li><code>client = anthropic.Anthropic()</code> — create a client object. It auto-reads your API key from <code>ANTHROPIC_API_KEY</code> env var.</li>
      <li><code>messages.create(...)</code> — send a request to Claude</li>
      <li><code>model="claude-opus-4-7"</code> — which Claude version (verify current ID at docs.anthropic.com/models)</li>
      <li><code>max_tokens=100</code> — cap on response length (1 token ≈ 0.75 words). Cost cap.</li>
      <li><code>messages=[...]</code> — conversation history. List of dicts with <code>role</code> (user or assistant) and <code>content</code> (text)</li>
      <li><code>msg.content[0].text</code> — extract the response text from Claude's structured reply</li>
    </ul>`, code:`# test_claude.py
import anthropic

client = anthropic.Anthropic()

msg = client.messages.create(
    model="claude-opus-4-7",
    max_tokens=100,
    messages=[
        {"role": "user", "content": "In 5 words: what is an LLM?"}
    ],
)

print(msg.content[0].text)
print(f"Used {msg.usage.input_tokens} input + {msg.usage.output_tokens} output tokens")`},
    {h:"Install the library and run it", body:`<p>Open PowerShell in the folder where you saved <code>test_claude.py</code> (in VS Code, View → Terminal opens one there). Run these two commands.</p>
    <ul>
      <li>First command: downloads + installs the <code>anthropic</code> library so Python can import it.</li>
      <li>Second command: runs your script.</li>
    </ul>
    <p>If you see "AuthenticationError" → your API key isn't set. Run <code>echo $env:ANTHROPIC_API_KEY</code> — if empty, fix with <code>setx</code> + reopen shell.</p>`, code:`uv pip install anthropic
python test_claude.py
# Should print 5-word answer like "Predicts next token from context."
# Plus token counts.`},
    {h:"Create your GitHub repo + push code", body:`<p><b>What is GitHub?</b> Free cloud service that stores Git repos. Your code lives in folders called <b>repositories (repos)</b>.</p>
    <p><b>Why we push code to GitHub:</b></p>
    <ul>
      <li>Backup — your laptop could die tomorrow</li>
      <li>Portfolio — recruiters click these links</li>
      <li>Sharing — show others your work</li>
      <li>Activity graph — green squares = "this person codes"</li>
    </ul>
    <p><b>Steps:</b></p>
    <ol>
      <li>Sign up at <a href="https://github.com" target="_blank">github.com</a> if you haven't</li>
      <li>Top-right "+" → New repository</li>
      <li>Name it <code>AI_training</code>, leave it Public, DO NOT add README (we'll push our own)</li>
      <li>Click Create</li>
      <li>Now copy GitHub's URL — looks like <code>https://github.com/YOURNAME/AI_training.git</code></li>
      <li>In PowerShell, run the commands below (replace USER with your username)</li>
    </ol>
    <p><b>What each git command does:</b></p>
    <ul>
      <li><code>git init</code> — turn this folder into a Git repo (creates hidden <code>.git/</code>)</li>
      <li><code>git branch -M main</code> — rename default branch to "main"</li>
      <li><code>git add .</code> — stage all files in folder for commit</li>
      <li><code>git commit -m "init"</code> — save snapshot with message "init"</li>
      <li><code>git remote add origin URL</code> — link local repo to GitHub URL</li>
      <li><code>git push -u origin main</code> — upload your snapshots</li>
    </ul>`, code:`mkdir AI_training
cd AI_training
git init
git branch -M main
echo "# AI Training" > README.md
git add .
git commit -m "init: zero-to-hero AI track"
git remote add origin https://github.com/USER/AI_training.git
git push -u origin main
# First push will prompt for GitHub login (browser opens)`},
    {h:"Optional but recommended: where to find current Claude model IDs", body:`<p>Model IDs change every release. Course examples use <code>claude-opus-4-7</code>, <code>claude-sonnet-4-6</code>, <code>claude-haiku-4-5-20251001</code> (2026 era).</p>
    <p><b>Always verify at:</b> <a href="https://docs.anthropic.com/en/docs/about-claude/models" target="_blank">docs.anthropic.com/en/docs/about-claude/models</a></p>
    <p>If a code example fails with "model_not_found", check that page for the current ID and replace.</p>`},
  ],
  quiz:[
    {type:"mcq", q:"Why setx instead of $env:VAR='...' in PowerShell?", options:["setx is faster","setx persists to user env; $env: lasts only current session","Add to $PROFILE — they're identical","Use Set-Item env:VAR — setx is deprecated"], answer:1, explain:"setx writes to HKCU\\Environment registry; future shells inherit. $env: is in-process. $PROFILE works but requires re-sourcing. Set-Item env: is also in-process."},
    {type:"mcq", q:"Where do you find the current Claude model IDs to use?", options:["This course's hardcoded values are forever stable","Anthropic console homepage banner","docs.anthropic.com/en/docs/about-claude/models — the authoritative list, updated on each release","StackOverflow"], answer:2, explain:"Model IDs change with releases. Always source-of-truth at docs.anthropic.com/models. Course examples illustrate the pattern but verify before depending on a specific ID."},
    {type:"short", q:"Public vs private repo for AI portfolio?", model:"Public = visible, linkable from resume/LinkedIn = portfolio leverage. Private = hides code but still counts for activity graph. Default to PUBLIC for portfolio.", rubric:["public=visible","portfolio needs public"]},
  ],
  project:{title:"Phase 0 deliverable", steps:["test_claude.py prints response","git push to AI_training succeeds","README written"]}
},
{ id:1, title:"Phase 0.5 — Python Basics", est:"8-15 hrs",
  intro:"This phase teaches Python basics. Everything explained from scratch, no prior coding assumed. Skim ONLY if you can read all the code below at a glance and want to skip.",
  lessons:[
    {h:"Optional QA → Python analogies (skip if not from QA background)", body:`<p>If you've done QA testing before, these analogies may help. If not, skip — every term below is taught from scratch in the following lessons.</p>
    <table>
      <tr><th>QA concept</th><th>Python concept</th></tr>
      <tr><td>Test data / fixture</td><td>Variable, dict, list</td></tr>
      <tr><td>Test helper function</td><td><code>def func():</code></td></tr>
      <tr><td>Page Object Model</td><td>Class (<code>class Page:</code>)</td></tr>
      <tr><td>Test step / assertion</td><td><code>assert</code></td></tr>
      <tr><td>Expected exception</td><td><code>try/except</code></td></tr>
      <tr><td>Test runner (pytest/TestNG)</td><td>pytest library (taught later this phase)</td></tr>
      <tr><td>Logging / report</td><td><code>print()</code>, <code>logging</code> module</td></tr>
      <tr><td>BDD steps</td><td>A function = one step, called by name</td></tr>
    </table>
    <div class="callout"><b>Core idea:</b> A program is inputs → behavior → outputs. ML adds "the behavior is <i>learned</i> from examples" instead of written by hand. Everything else stays the same.</div>`},
    {h:"Python basics — variables & types", body:"<p>Everything is an object. No type declarations needed.</p>", code:`# numbers, strings, booleans\nx = 42                # int\npi = 3.14             # float\nname = "ada"          # str\nactive = True         # bool\n\n# containers\nnumbers = [1, 2, 3]                          # list (mutable, ordered)\npoint = (10, 20)                              # tuple (immutable)\nuser = {"name": "ada", "age": 35}            # dict (key→value)\ntags = {"ml", "qa", "python"}                 # set (unique)\n\n# type check\nprint(type(x))           # <class 'int'>\nprint(isinstance(x, int))# True`},
    {h:"Control flow", body:"", code:`# if/elif/else\nscore = 85\nif score >= 90: grade = "A"\nelif score >= 80: grade = "B"\nelse: grade = "C"\n\n# for loop\nfor n in [1,2,3]: print(n*n)\nfor k, v in {"a":1,"b":2}.items(): print(k, v)\n\n# while\ni = 0\nwhile i < 3:\n    print(i); i += 1\n\n# list comprehension (very Pythonic)\nsquares = [n*n for n in range(10) if n % 2 == 0]\n# = [0, 4, 16, 36, 64]`},
    {h:"Functions", body:"", code:`# basic function\ndef add(a, b):\n    return a + b\n\n# default args + keyword args\ndef greet(name, greeting="Hello"):\n    return f"{greeting}, {name}!"\n\ngreet("Ada")                      # "Hello, Ada!"\ngreet("Ada", greeting="Hi")       # "Hi, Ada!"\n\n# *args (variable positional), **kwargs (keyword dict)\ndef debug(*args, **kwargs):\n    print("args:", args)\n    print("kwargs:", kwargs)\n\ndebug(1, 2, 3, name="ada", age=35)`},
    {h:"Classes (Page Object analogue)", body:"", code:`class User:\n    def __init__(self, name, age):     # constructor (auto-called)\n        self.name = name\n        self.age = age\n    def greet(self):\n        return f"Hi, I'm {self.name}"\n    def __repr__(self):\n        return f"User({self.name!r}, {self.age})"\n\nu = User("Ada", 35)\nprint(u.greet())     # Hi, I'm Ada\nprint(u)             # User('Ada', 35)`},
    {h:"Errors + exceptions (like expected test failures)", body:"", code:`def divide(a, b):\n    if b == 0:\n        raise ValueError("can't divide by zero")\n    return a / b\n\ntry:\n    divide(10, 0)\nexcept ValueError as e:\n    print(f"caught: {e}")\nfinally:\n    print("cleanup runs always")`},
    {h:"File I/O", body:"", code:`# read\nwith open("data.txt") as f:\n    text = f.read()\n\n# write\nwith open("out.txt", "w") as f:\n    f.write("hello\\nworld")\n\n# read lines\nwith open("data.txt") as f:\n    for line in f:\n        print(line.strip())`},
    {h:"pytest — automated testing in Python", body:`<p><b>What it is:</b> pytest is a library that runs your test functions and reports which pass/fail. It's the Python equivalent of JUnit (Java) or TestNG.</p>
    <p><b>Why ML projects need testing:</b></p>
    <ul>
      <li>Catch regressions when refactoring data preprocessing</li>
      <li>Verify your loss function math against known cases</li>
      <li>Sanity-check that model output shapes are correct</li>
      <li>Run automatically in CI on every git push (block bad PRs)</li>
    </ul>
    <h4>Install</h4>
    <pre><code>uv pip install pytest</code></pre>
    <h4>How pytest works (the 3 rules)</h4>
    <ol>
      <li>Files named <code>test_*.py</code> are discovered automatically</li>
      <li>Functions named <code>test_*</code> inside those files are run as tests</li>
      <li>Each test passes if no exception (especially no <code>assert</code> failure); fails otherwise</li>
    </ol>
    <h4>Your first test</h4>
    <p>Save the code below as <code>test_math.py</code> next to your code. From PowerShell in same folder: <code>pytest -v</code></p>
    <p><b>What each piece means:</b></p>
    <ul>
      <li><code>def add(a, b)</code> = the function we're testing (would normally be in a separate <code>math.py</code> file)</li>
      <li><code>def test_add_positive()</code> = a test function (name MUST start with <code>test_</code>)</li>
      <li><code>assert add(2, 3) == 5</code> = the actual check. If equal, pass. If not, pytest prints the failure.</li>
      <li><code>@pytest.mark.parametrize</code> = decorator that runs the same test multiple times with different inputs. Saves writing 10 nearly-identical tests.</li>
      <li><code>pytest -v</code> = <i>v</i>erbose flag, shows each test name as it runs</li>
    </ul>`, code:`# test_math.py
def add(a, b):
    return a + b

def test_add_positive():
    assert add(2, 3) == 5

def test_add_negative():
    assert add(-1, -1) == -2

import pytest
@pytest.mark.parametrize("a,b,expected", [
    (1, 1, 2),
    (0, 0, 0),
    (2, 3, 5),
])
def test_add_param(a, b, expected):
    assert add(a, b) == expected

# Run from the same folder:
#   pytest test_math.py -v
# Output: 5 passed in 0.01s`},
    {h:"List + dict tricks worth knowing", body:"", code:`# unpacking\na, b, c = [1, 2, 3]\nfirst, *rest = [1, 2, 3, 4]   # first=1, rest=[2,3,4]\n\n# dict comprehension\nsquares = {n: n*n for n in range(5)}\n\n# enumerate (index + value)\nfor i, val in enumerate(["a","b","c"]):\n    print(i, val)\n\n# zip (iterate parallel)\nfor name, age in zip(["Ada","Bob"], [35, 40]):\n    print(name, age)\n\n# sorted with key\nusers = [{"n":"Ada","age":35},{"n":"Bob","age":28}]\nby_age = sorted(users, key=lambda u: u["age"])`},
    {h:"Project structure for ML", body:`<pre><code>AI_training/\n├── README.md\n├── requirements.txt\n├── .gitignore\n├── data/         # datasets (often gitignored)\n├── notebooks/    # exploration\n├── src/          # reusable modules\n│   ├── __init__.py\n│   └── train.py\n├── tests/        # pytest tests\n└── scripts/      # one-off runners</code></pre>`},
  ],
  quiz:[
    {type:"mcq", q:"Difference between a Python list and a tuple?", options:["No difference","List is mutable; tuple is immutable","Tuple is faster always","List can't hold mixed types"], answer:1, explain:"Lists support append/remove/edit. Tuples are fixed once created. Use tuples for fixed-shape records (coords, return values) and lists for collections that grow."},
    {type:"mcq", q:"What does <code>self</code> mean in a class method?", options:["Reserved keyword","Convention name for the instance the method was called on (first arg auto-passed)","Required by Python","The class itself"], answer:1, explain:"self is not a keyword, just a convention. Python auto-passes the instance as first arg when you call obj.method()."},
    {type:"mcq", q:"What does this print? <code>x = [1,2,3]; y = x; y.append(4); print(x)</code>", options:["[1,2,3]","[1,2,3,4]","Error","[1,2,3,4,4]"], answer:1, explain:"y = x doesn't copy, both names point to same list. Mutating via y mutates x. Tester-relevant bug pattern. Use x.copy() or list(x) for a copy."},
    {type:"short", q:"Translate this QA mental model to Python: 'A page object has methods to interact with elements. Each method returns either a value or another page object.'", model:"In Python: a class with __init__(self, driver) holds element locators, methods (def click_login, def get_title) do interactions, methods return values or other Page instances for navigation. Same pattern as Selenium/Playwright POM. Python adds: properties (@property) for computed attrs, dataclasses for simple data holders, type hints (def click_login(self) -> 'DashboardPage') for IDE help.", rubric:["class with __init__","methods do actions","methods return values/pages"]},
  ],
  project:{title:"Phase 0.5 deliverable", steps:["Write 5 pytest tests for a small Python module","Create a class with constructor + 3 methods","Push to AI_training repo under /python_basics/"]}
},
{ id:2, title:"Phase 1 — Math Foundations", est:"25-40 hrs",
  intro:"Can't debug LLMs without linear algebra + gradients + probability. Skip = stuck at Phase 6. This phase uses analogies + numeric examples; don't memorize formulas, build intuition.",
  lessons:[
    {h:"Vectors — what they are and why ML uses them", body:`<p><b>A vector is two things at once:</b></p>
    <ol>
      <li>A <b>list of numbers</b> like <code>[3, 1, 4]</code></li>
      <li>An <b>arrow in space</b> pointing from origin (0,0,0) to point (3,1,4)</li>
    </ol>
    <p>Both views matter. The "list" view is what you store in numpy. The "arrow" view is how you reason about it geometrically.</p>
    <p><b>In ML, vectors are how we represent things:</b></p>
    <ul>
      <li>One sentence → a vector of 768 numbers (an "embedding")</li>
      <li>One image → flatten 28×28 pixels to a 784-number vector</li>
      <li>One user → vector of [age, num_purchases, total_spend, ...]</li>
    </ul>
    <p><b>Why?</b> Because computers can do math on vectors fast (matrix operations on GPUs). Once data is a vector, you can ask: "how similar are these two things?" That question is the heart of search, recommendation, and attention.</p>
    <p><b>Concrete example.</b> Two cats represented as vectors of [tail_length, weight]:</p>
    <pre><code>cat_A = [10, 8]   # short tail, heavy
cat_B = [25, 4]   # long tail, light
cat_C = [11, 9]   # short tail, heavy (like cat_A)</code></pre>
    <p>Vectors cat_A and cat_C "point in similar directions" → similar cats. cat_B is different. We'll measure that with dot product in 2 lessons.</p>`},
    {h:"Matrices and matrix multiplication", body:`<details class="try"><summary>🎯 Try first: what shape does (3,4) @ (4,7) produce?</summary><div class="ans">Answer: <b>(3, 7)</b>. Inner dims (4 and 4) must match and cancel. Outer dims (3 and 7) survive.</div></details>
    <p><b>A matrix is a grid of numbers</b>, e.g. shape (rows, cols):</p>
    <pre><code>A = [[1, 2, 3],
     [4, 5, 6]]    # shape (2, 3)</code></pre>
    <p><b>Geometric meaning:</b> a matrix is a <b>linear transformation</b> — multiplying by it rotates, scales, or shears space.</p>
    <p><b>Matrix multiplication</b> <code>C = A @ B</code> combines two transformations.</p>
    <p><b>Shape rule:</b> <code>(m, k) @ (k, n) → (m, n)</code>. Inner dims must match.</p>
    <p><b>How a single cell is computed.</b> <code>C[i, j]</code> = dot product of row i of A with column j of B:</p>
    <pre><code>A = [[1, 2],
     [3, 4]]    # (2, 2)
B = [[5, 6],
     [7, 8]]    # (2, 2)

C[0,0] = 1*5 + 2*7 = 19
C[0,1] = 1*6 + 2*8 = 22
C[1,0] = 3*5 + 4*7 = 43
C[1,1] = 3*6 + 4*8 = 50

C = [[19, 22],
     [43, 50]]</code></pre>
    <p><b>Why ML cares:</b> every neural network layer is a matmul. <code>output = input @ W</code>. A model with 1B parameters = a stack of huge matmuls. GPUs exist to do this fast.</p>
    <p><b>Common confusion:</b> <code>@</code> is matmul. <code>*</code> is element-wise (Hadamard). Different operations.</p>`, code:`import numpy as np

A = np.array([[1, 2], [3, 4]])
B = np.array([[5, 6], [7, 8]])

print(A @ B)     # matrix multiply → [[19,22],[43,50]]
print(A * B)     # element-wise   → [[5,12],[21,32]]
print(A.T)       # transpose      → [[1,3],[2,4]]`},
    {h:"Dot product — measuring similarity", body:`<details class="try"><summary>🎯 Try first: a=[1,0], b=[0,1]. What is a·b?</summary><div class="ans">Answer: <b>0</b>. Element-wise: 1·0 + 0·1 = 0. Geometrically these are perpendicular (90°), so cos(90°)=0 confirms it.</div></details>
    <p>The dot product of two vectors <code>a · b = a[0]*b[0] + a[1]*b[1] + ...</code> (sum element-wise products).</p>
    <p><b>Geometric meaning:</b> <code>a · b = |a| · |b| · cos(θ)</code> where θ is the angle between them.</p>
    <ul>
      <li>θ = 0° (same direction): cos = 1 → max similarity</li>
      <li>θ = 90° (perpendicular): cos = 0 → unrelated</li>
      <li>θ = 180° (opposite): cos = -1 → max dissimilarity</li>
    </ul>
    <p><b>This is THE most important operation in modern AI.</b> Every "is X similar to Y" question — retrieval, attention, recommendation — uses dot products.</p>
    <p><b>Numeric example with our cats from earlier:</b></p>
    <pre><code>cat_A · cat_C = 10*11 + 8*9  = 110 + 72 = 182   # high → similar
cat_A · cat_B = 10*25 + 8*4  = 250 + 32 = 282   # higher? but...

# raw dot product favors big numbers. Normalize first:
def cosine_sim(a, b):
    return (a·b) / (|a| * |b|)

cosine_sim(cat_A, cat_C) ≈ 0.998  # nearly identical direction
cosine_sim(cat_A, cat_B) ≈ 0.766  # less similar direction</code></pre>
    <p><b>In LLMs:</b> attention computes <code>Q · K</code> for every (query, key) pair → "how much does token Q want to attend to token K?". Same operation as the cat similarity.</p>`, code:`import numpy as np

a = np.array([10, 8])
b = np.array([25, 4])
c = np.array([11, 9])

# raw dot product
print(a @ c)  # 182
print(a @ b)  # 282

# cosine similarity (normalized)
def cosine(a, b):
    return (a @ b) / (np.linalg.norm(a) * np.linalg.norm(b))

print(cosine(a, c))  # ~0.998 — very similar
print(cosine(a, b))  # ~0.766 — less similar`},
    {h:"Transpose, determinant, eigenvectors, SVD (when you need each)", body:`<p>Four more concepts. Don't memorize, just know what they mean when you hit them later.</p>
    <h4>Transpose Aᵀ</h4>
    <p>Flips rows and columns. Shape (m, n) → (n, m). Used everywhere — most famously in attention's <code>Q K^T</code>.</p>
    <pre><code>A  = [[1, 2, 3]]      # shape (1, 3)
A.T = [[1], [2], [3]] # shape (3, 1)</code></pre>
    <h4>Determinant</h4>
    <p>Single number that says "how much does this matrix scale volume?". If <code>det(A) = 0</code>, the transformation squishes a dimension flat → not invertible. Useful for understanding when an operation loses information.</p>
    <h4>Eigenvectors</h4>
    <p>Special vectors that a matrix only <b>scales</b>, never rotates: <code>A · v = λ · v</code>. λ (lambda) is the eigenvalue — how much it scales.</p>
    <p>Intuition: if A is a rotation, most vectors rotate. But the axis of rotation doesn't. That axis = eigenvector. λ = 1 (no scaling).</p>
    <p>Used in PCA (find directions of most variance), stability analysis, graph algorithms.</p>
    <h4>SVD — Singular Value Decomposition</h4>
    <p>Every matrix can be decomposed into: <b>rotate → scale → rotate</b>. SVD gives you those three matrices.</p>
    <p><code>A = U · Σ · Vᵀ</code>  where U, V are rotations and Σ is diagonal (scale factors called singular values).</p>
    <p><b>This is the math behind LoRA.</b> If only the top-r singular values matter, you can approximate A with rank-r update → way fewer parameters. That's how LoRA fine-tunes 7B models on a laptop.</p>`, code:`import numpy as np
A = np.array([[1, 2, 3], [4, 5, 6], [7, 8, 10]])

print(A.T)                # transpose
print(np.linalg.det(A))   # scalar volume scale

vals, vecs = np.linalg.eig(A)   # eigenvalues + eigenvectors
print("eigenvalues:", vals)

U, S, Vt = np.linalg.svd(A)
print("singular values:", S)    # important values; small ones can be dropped`},
    {h:"Derivatives — the slope of a function", body:`<details class="try"><summary>🎯 Try first: f(x) = 5x. What's the slope?</summary><div class="ans">Answer: <b>5</b>. A straight line of slope 5 has derivative = 5 everywhere. (Rule: derivative of c·x is c.)</div></details>
    <p><b>What a derivative is:</b> the slope of a function at a specific point. If <code>f(x) = x²</code>, then <code>f'(x) = 2x</code> — at x=3, slope is 6.</p>
    <p><b>Why ML cares:</b> we have a <b>loss function</b> measuring how wrong the model is. We want to find parameter values where the loss is minimum. Derivatives tell us which direction (and how much) to move parameters to reduce loss.</p>
    <p><b>Picture:</b> imagine you're on a hill in fog. You want to reach the bottom. Feel the ground around your feet → walk in the steepest-down direction → repeat. That's gradient descent.</p>
    <p><b>The rules you actually need:</b></p>
    <pre><code>f(x) = c          → f'(x) = 0     (constant has no slope)
f(x) = x          → f'(x) = 1
f(x) = x²         → f'(x) = 2x
f(x) = xⁿ         → f'(x) = n·xⁿ⁻¹
f(x) = eˣ         → f'(x) = eˣ    (special!)
f(x) = log(x)     → f'(x) = 1/x
f(x) = a·g(x)     → f'(x) = a·g'(x)         (constant factor)
f(x) = g(x) + h(x)→ f'(x) = g'(x) + h'(x)  (sum)</code></pre>
    <p><b>Worked example:</b> <code>f(x) = 3x² + 5x - 7</code></p>
    <p>f'(x) = 3·(2x) + 5·(1) - 0 = <b>6x + 5</b></p>
    <p>At x=2: slope is 6·2 + 5 = 17. Steep upward. To minimize f, move x left (decrease).</p>`},
    {h:"Partial derivatives + gradient", body:`<p>Functions of multiple variables (like loss as function of millions of parameters) have a slope <b>per variable</b>.</p>
    <p><b>Partial derivative</b> <code>∂f/∂x</code> = derivative treating only x as variable, others as constants.</p>
    <p><b>Example.</b> <code>f(x, y) = x² + 3xy + y³</code></p>
    <pre><code>∂f/∂x = 2x + 3y    (treat y as constant)
∂f/∂y = 3x + 3y²   (treat x as constant)</code></pre>
    <p><b>Gradient</b> <code>∇f</code> = vector of all partial derivatives. For our example: <code>∇f = [2x + 3y, 3x + 3y²]</code>.</p>
    <p><b>Geometric meaning:</b> ∇f points in the direction of steepest <b>ascent</b>. So to minimize, step in the opposite direction: <code>x_new = x_old - α · ∇f(x_old)</code>. α is the learning rate.</p>
    <p><b>In a neural net with 1B parameters:</b> ∇L is a 1B-dimensional vector. Each entry says "to decrease loss, nudge this param by this much." That's training in one line.</p>`},
    {h:"Chain rule — the heart of backprop", body:`<details class="try"><summary>🎯 Try first: f(x) = (3x)². What is f'(x)?</summary><div class="ans">Answer: <b>18x</b>. Let g(x) = 3x (inner), outer = squared. f'(x) = 2·g(x)·g'(x) = 2·(3x)·3 = 18x.</div></details>
    <p>When a function is built by composing other functions, the chain rule tells you how to take its derivative:</p>
    <span class="formula">d/dx f(g(x)) = f'(g(x)) · g'(x)</span>
    <p><b>Plain English:</b> outer derivative (evaluated at inner) <b>times</b> inner derivative.</p>
    <p><b>Worked example.</b> <code>f(x) = sin(x²)</code>. Let <code>g(x) = x²</code>, outer is sin. Then:</p>
    <pre><code>f'(x) = cos(x²) · 2x
       = cos(inner) · derivative_of_inner</code></pre>
    <p><b>Why it matters for ML.</b> A neural net is composition: <code>L = loss(model(input, W))</code>. To update W, we need <code>∂L/∂W</code>. That requires chaining through every layer.</p>
    <p><b>Backpropagation = chain rule applied repeatedly backward through layers.</b> Each layer hands its downstream gradient back times its own local Jacobian.</p>
    <p><b>Memorize this identity (appears everywhere):</b></p>
    <span class="formula">σ(z) = 1 / (1 + e⁻ᶻ),  σ'(z) = σ(z) · (1 - σ(z))</span>
    <p>The sigmoid's derivative can be written in terms of itself. Used in logistic regression gradients and historical RNN derivations.</p>`},
    {h:"Probability — distributions, expectation, conditional", body:`<p><b>Random variable</b> X = a value drawn from some process. Result of a die roll, next token, image label.</p>
    <p><b>Distribution</b> = how likely each outcome is.</p>
    <ul>
      <li><b>PMF</b> (probability mass function) for discrete outcomes: <code>P(X = "cat") = 0.7</code></li>
      <li><b>PDF</b> (probability density function) for continuous: bell curve, etc.</li>
    </ul>
    <p><b>Expectation</b> E[X] = average outcome weighted by probability:</p>
    <pre><code>E[X] = Σ x · P(X = x)

Die: E[X] = 1·(1/6) + 2·(1/6) + ... + 6·(1/6) = 3.5</code></pre>
    <p><b>Conditional probability</b> P(A | B) = "probability of A given that B happened":</p>
    <pre><code>P(A | B) = P(A and B) / P(B)</code></pre>
    <p><b>Bayes' theorem</b> — flip the conditional:</p>
    <span class="formula">P(A | B) = P(B | A) · P(A) / P(B)</span>
    <p><b>Worked Bayes example.</b> Disease affects 1% of people. Test is 99% accurate. You test positive. What's the chance you have it?</p>
    <pre><code>P(disease | positive)
= P(positive | disease) · P(disease) / P(positive)
= 0.99 · 0.01 / [0.99·0.01 + 0.01·0.99]
= 0.0099 / 0.0198
= 0.5  (50%!)</code></pre>
    <p>Intuition: false positives from the 99% of healthy people swamp the true positives from the 1% who are sick.</p>`},
    {h:"Entropy, cross-entropy, KL — the LLM loss function", body:`<details class="try"><summary>🎯 Try first: model says cat=0.9, dog=0.1. True label is cat. Cross-entropy?</summary><div class="ans">Answer: <b>-log(0.9) ≈ 0.105</b>. Only the true class contributes: -1·log(p_cat). If model said cat=0.5, loss would be -log(0.5)≈0.69, much worse.</div></details>
    <p>Three info-theory quantities. Memorize what each means.</p>
    <h4>Entropy H(p)</h4>
    <p>"How much uncertainty does this distribution have?"</p>
    <span class="formula">H(p) = -Σ p(x) · log p(x)</span>
    <ul>
      <li>Coin flip 50/50 → H = 1 bit (maximum uncertainty)</li>
      <li>Coin always heads → H = 0 (no uncertainty)</li>
    </ul>
    <h4>Cross-entropy H(p, q)</h4>
    <p>"How many bits do I waste using distribution q to encode events from distribution p?"</p>
    <span class="formula">H(p, q) = -Σ p(x) · log q(x)</span>
    <p>p = true distribution (correct token = 100%, others 0%). q = model's predicted distribution. <b>Minimizing H(p, q) = training the LLM.</b></p>
    <p><b>Concrete example.</b> True next token is "cat" (one-hot). Model outputs:</p>
    <pre><code>q("cat") = 0.7
q("dog") = 0.2
q("bird") = 0.1

Cross-entropy = -(1·log(0.7) + 0·log(0.2) + 0·log(0.1))
              = -log(0.7) ≈ 0.357

If model output q("cat") = 0.99:
CE = -log(0.99) ≈ 0.010  ← lower loss, better</code></pre>
    <h4>KL divergence KL(p ‖ q)</h4>
    <p>"How different are distributions p and q?"</p>
    <span class="formula">KL(p ‖ q) = Σ p(x) · log(p(x)/q(x)) = H(p, q) − H(p)</span>
    <p>Always ≥ 0. Zero only when p = q. Used in RLHF and DPO as a "stay close to the original model" anchor.</p>
    <div class="callout"><b>The summary:</b> LLMs are trained by minimizing cross-entropy between true next-token distribution (one-hot) and model's predicted distribution (softmax over vocab). Every gradient step nudges parameters so the model puts more probability mass on correct tokens.</div>`},
    {h:"From-scratch linear regression (pure numpy)", body:"<p>Derive gradients by hand, then code.</p>", code:`import numpy as np\nnp.random.seed(0)\nX = np.random.randn(100,1)\ny = 3*X.squeeze() + 2 + 0.1*np.random.randn(100)\n\nw, b, lr = np.random.randn(), 0.0, 0.1\nfor s in range(200):\n    yhat = w*X.squeeze() + b\n    loss = ((yhat - y)**2).mean()\n    grad_w = 2*((yhat - y)*X.squeeze()).mean()\n    grad_b = 2*(yhat - y).mean()\n    w -= lr*grad_w; b -= lr*grad_b\n    if s % 20 == 0: print(f"{s} {loss:.4f} {w:.3f} {b:.3f}")`},
    {h:"Resources", body:`<ul>
      <li>3Blue1Brown <a href="https://www.youtube.com/playlist?list=PLZHQObOWTQDPD3MizzM2xVFitgF8hE_ab" target="_blank">Essence of Linear Algebra</a> (~3 hrs, watch all)</li>
      <li>3Blue1Brown Essence of Calculus eps 1-6, 9 (~2 hrs)</li>
      <li>Khan Academy — Probability & Statistics</li>
    </ul>`},
  ],
  quiz:[
    {type:"mcq", q:"Why -∇L not +∇L in gradient descent?", options:["∇L points to max loss; we want min","Convention","Numerical","Faster"], answer:0, explain:"Gradient = steepest ASCENT. Negate to descend."},
    {type:"mcq", q:"For A@B with shapes (3,4) and B, B must be:", options:["(3,k)","(4,n)","(n,3)","Any"], answer:1, explain:"Inner dims match: (3,4)@(4,n)=(3,n)."},
    {type:"mcq", q:"det(A)=0 means:", options:["A is identity","A collapses space → no inverse","A is symmetric","A rotates 90°"], answer:1, explain:"Zero volume scale = squished dimension = singular."},
    {type:"mcq", q:"Cross-entropy is minimized when:", options:["Outputs equal labels","Predicted distribution matches true distribution","Entropy max","KL=1"], answer:1, explain:"H(p,q) = H(p) + KL(p‖q). Min CE = min KL = match distributions."},
    {type:"mcq", q:"σ'(z) = ?", options:["σ(z)","1-σ(z)","σ(z)(1-σ(z))","e⁻ᶻ"], answer:2, explain:"Classic identity. Memorize."},
    {type:"short", q:"Why is dot product useful for similarity?", model:"a·b = |a||b|cosθ. Aligned vectors → high. Perpendicular → 0. Opposite → negative. Normalize to unit length → exactly cosine similarity in [-1,1]. Attention uses Q·Kᵀ for exactly this reason.", rubric:["cosθ","perpendicular=0","attention uses it"]},
    {type:"short", q:"Why is backprop just chain rule?", model:"d/dx f(g(x)) = f'(g(x))·g'(x). Neural net = composition fₙ(fₙ₋₁(...f₁(x))). Loss = scalar at end. To get ∂L/∂param, multiply local gradients backward layer by layer. Each layer hands downstream gradient back times its own local Jacobian. That's backprop.", rubric:["chain rule","composition","multiply backward"]},
  ],
  project:{title:"Phase 1 deliverable", steps:["phase1_linreg_scratch.py converges (w≈3,b≈2)","Math notes pushed","Can whiteboard backprop unaided"]}
},
{ id:3, title:"Phase 2 — Python for ML", est:"12-20 hrs",
  intro:"numpy + pandas fluency. The single biggest skill jump from beginner Python to ML Python is <b>vectorization</b> — replacing loops with array operations that run 100× faster on the same hardware.",
  lessons:[
    {h:"Why vectorize? (the most important Python ML skill)", body:`<p><b>Slow Python:</b></p>
    <pre><code># Add 1 to each element of a million numbers
result = []
for x in numbers:        # explicit loop in Python
    result.append(x + 1)
# Takes ~0.5 seconds</code></pre>
    <p><b>Fast numpy:</b></p>
    <pre><code>result = numbers + 1     # vectorized
# Takes ~0.005 seconds (100× faster)</code></pre>
    <p><b>Why?</b> Python's <code>for</code> loop runs slow interpreted code per element. numpy ships the whole array to compiled C code that processes it in one batch, often using CPU SIMD instructions or GPU.</p>
    <p><b>The rule:</b> if you write <code>for</code> over array elements, you're doing it wrong. Find the numpy operation that does the same thing on the whole array.</p>
    <p><b>What "vectorized" means:</b> the operation applies element-wise without explicit loops. Math operators (+, -, *, /), functions (np.exp, np.log), comparisons (>, ==) all work on entire arrays at once.</p>`},
    {h:"numpy core — what each operation does", body:`<p>Memorize these. They're the alphabet of ML code.</p>
    <h4>Creating arrays</h4>
    <pre><code>np.zeros((3, 4))      # 3x4 of zeros
np.ones(5)            # length-5 of ones
np.eye(4)             # 4x4 identity (1s on diagonal)
np.random.randn(100, 5) # 100x5 random from N(0,1)
np.arange(10)         # [0,1,2,...,9]
np.linspace(0, 1, 50) # 50 evenly spaced from 0 to 1</code></pre>
    <h4>Shape manipulation</h4>
    <pre><code>a = np.arange(6)            # shape (6,)  → [0,1,2,3,4,5]
a.reshape(2, 3)             # → [[0,1,2],[3,4,5]]
a.reshape(-1, 2)            # -1 = "infer this dim" → (3,2)
a[:, None]                  # add axis → (6,1) column vector
np.concatenate([a, b], axis=0)  # stack along rows</code></pre>
    <h4>Math (element-wise unless noted)</h4>
    <pre><code>a + b        # element-wise add
a * b        # element-wise multiply (NOT matmul)
np.exp(a)    # e^x element-wise
np.log(a)    # natural log
np.maximum(a, 0)  # ReLU: max(x, 0) per element
A @ B        # matrix multiplication</code></pre>
    <h4>Reductions (collapse a dimension)</h4>
    <pre><code>a.sum()            # one number (sum all)
a.mean(axis=0)     # collapse axis 0 → average per column
a.std(axis=1, keepdims=True)  # std per row, keep 2D shape
a.argmax()         # index of max element</code></pre>
    <h4>Masking (boolean indexing)</h4>
    <pre><code>a[a > 0]           # keep only positive elements
a[a < 0] = 0       # in-place ReLU</code></pre>`},
    {h:"Broadcasting — the magic that powers everything", body:`<p><b>The problem:</b> you have an array X of shape (100, 5) — 100 samples, 5 features. You want to subtract the mean of each column. The mean has shape (5,). How can you compute (100, 5) - (5,)?</p>
    <p><b>Answer: broadcasting.</b> numpy automatically stretches the smaller array to match.</p>
    <p><b>The rules</b> (align shapes from the RIGHT):</p>
    <ol>
      <li>If one shape is shorter, pad the LEFT with 1s</li>
      <li>For each dim: sizes must match, or one of them must be 1</li>
      <li>Size-1 dims get "stretched" virtually (no memory copy)</li>
    </ol>
    <p><b>Worked example:</b></p>
    <pre><code>X.shape       = (100, 5)
mean.shape    = (5,)        → padded to (1, 5)
                              → stretched to (100, 5)
X - mean      → (100, 5)    ✓ works</code></pre>
    <p><b>Common failure:</b></p>
    <pre><code>X.shape  = (100, 5)
v.shape  = (100,)           → (1, 100)
                              → can't match 5 with 100
X - v    → ERROR</code></pre>
    <p>Fix: <code>X - v[:, None]</code> reshapes v to (100, 1) → broadcasts to (100, 5).</p>
    <p><b>Why this is huge:</b> half the operations in deep learning rely on broadcasting. LayerNorm, attention masks, position encodings — all use it.</p>`},
    {h:"Stable softmax", code:`def softmax(x):\n    x = x - x.max(axis=-1, keepdims=True)  # stability\n    e = np.exp(x)\n    return e / e.sum(axis=-1, keepdims=True)`},
    {h:"pandas essentials", code:`import pandas as pd\ndf = pd.read_csv("train.csv")\ndf.head(); df.info(); df.describe()\ndf[df.age>30]                                # filter\ndf.groupby("class")["fare"].mean()           # groupby\ndf.merge(other, on="id", how="left")         # join\ndf["age"].fillna(df["age"].median())         # impute\npd.get_dummies(df, columns=["sex"])          # one-hot`},
    {h:"matplotlib", code:`import matplotlib.pyplot as plt\nfig, ax = plt.subplots(1, 2, figsize=(10,4))\nax[0].scatter(df.age, df.fare, alpha=0.4)\nax[1].hist(df.age.dropna(), bins=30)\nplt.tight_layout(); plt.show()`},
    {h:"Titanic capstone", body:"<ol><li>Download Titanic train.csv from Kaggle</li><li>Notebook phase2_titanic_eda.ipynb</li><li>5 plots, each with 1-sentence insight</li><li>Push to repo</li></ol>"},
  ],
  quiz:[
    {type:"mcq", q:"A@B vs A*B?", options:["Same","@ matmul, * element-wise","* matmul","@ only 1D"], answer:1, explain:"@ → matmul. * → element-wise (Hadamard)."},
    {type:"mcq", q:"Why subtract max before exp in softmax?", options:["Speed","Numerical stability — prevents exp overflow","Math definition","Sum to 1"], answer:1, explain:"exp(1000)=inf. Shift to ≤0 first. Output identical (softmax shift-invariant)."},
    {type:"mcq", q:"Which broadcast? (3,4) + ?", options:["(4,3)","(3,)","(4,)","(4,3) only"], answer:2, explain:"Align right: (3,4)+(4,)→(3,4)+(1,4)→ok. (3,) fails."},
    {type:"short", q:"pandas vs numpy?", model:"pandas: heterogeneous tabular data with named cols, mixed dtypes, NaNs, groupby/joins — like SQL table. numpy: homogeneous numerical arrays, hot loops, model code. Convert at boundary: df.to_numpy() before training.", rubric:["pandas=tabular","numpy=fast numerical","convert at boundary"]},
  ],
  project:{title:"Phase 2 deliverable", steps:["10 numpy drills solved","phase2_titanic_eda.ipynb with 5 insights","titanic_clean.csv"]}
},
{ id:4, title:"Phase 3 — Classical ML", est:"20-30 hrs",
  intro:"LLM-only candidates fail interviews. Classical ML teaches the patterns (overfit, regularization, evaluation) that show up in every deep learning project too.",
  lessons:[
    {h:"What classical ML is and why you need it", body:`<p><b>Classical ML</b> = the algorithms before deep learning took over (~2012). Linear regression, decision trees, random forests, gradient boosting, k-nearest neighbors, SVMs.</p>
    <p><b>Why still relevant in 2026:</b></p>
    <ol>
      <li><b>Tabular data still rules.</b> For CSVs with rows of numbers, XGBoost often beats deep learning. Hospital data, financial data, business KPIs — classical wins.</li>
      <li><b>Interviews ask it.</b> Bias-variance, regularization, ROC curves are standard ML interview questions. LLM-only candidates fail.</li>
      <li><b>Concepts transfer.</b> Overfitting, regularization, cross-validation, eval metrics — same concepts apply to LLMs.</li>
      <li><b>Cheap baseline.</b> Always train a simple model first. Beats spending 3 weeks on a neural net that doesn't outperform.</li>
    </ol>
    <p>You don't need to master 20 algorithms. Master 5: linear regression, logistic regression, random forest, gradient boosting (XGBoost), and k-means. Plus eval discipline.</p>`},
    {h:"Supervised landscape", body:`<table>
      <tr><th>Algorithm</th><th>Problem type</th><th>What it does (one line)</th></tr>
      <tr><td>Linear regression</td><td>Continuous target</td><td>Fit a straight line/plane minimizing squared error.</td></tr>
      <tr><td>Logistic regression</td><td>Binary classification</td><td>Linear regression + sigmoid output → probability.</td></tr>
      <tr><td>Decision tree</td><td>Either</td><td>Series of if/else splits chosen to maximize information gain.</td></tr>
      <tr><td>Random forest</td><td>Either</td><td>Many random trees voting. Reduces overfit via averaging.</td></tr>
      <tr><td>XGBoost / LightGBM</td><td>Either</td><td>Trees grown sequentially, each fixing previous errors. SOTA tabular.</td></tr>
      <tr><td>k-Nearest Neighbors</td><td>Either</td><td>Predict using k closest training points. No training, slow predict.</td></tr>
    </table>`},
    {h:"Bias-variance — why models fail (the most-tested ML concept)", body:`<p><b>Two ways a model can be wrong:</b></p>
    <ul>
      <li><b>High bias</b> = "model too simple" → underfits. Picture: trying to fit a sine wave with a straight line.</li>
      <li><b>High variance</b> = "model too sensitive to training data" → memorizes noise. Picture: a wiggly curve hitting every training point but failing on new data.</li>
    </ul>
    <p><b>Diagnose by comparing train vs val accuracy:</b></p>
    <table>
      <tr><th>train acc</th><th>val acc</th><th>diagnosis</th><th>fix</th></tr>
      <tr><td>60%</td><td>60%</td><td>High bias (underfit)</td><td>More features, deeper model, train longer, less regularization</td></tr>
      <tr><td>99%</td><td>70%</td><td>High variance (overfit)</td><td>More data, regularization, simpler model, dropout</td></tr>
      <tr><td>85%</td><td>83%</td><td>Just right (small gap)</td><td>Ship or tune more carefully</td></tr>
      <tr><td>60%</td><td>30%</td><td>Bug — val worse than train shouldn't happen this badly</td><td>Data leakage? Distribution shift? Bad split?</td></tr>
    </table>
    <p><b>Total error decomposition:</b> <code>error = bias² + variance + irreducible_noise</code>. You can trade bias for variance but not eliminate both.</p>`},
    {h:"Regularization — fighting overfitting", body:`<p><b>The setup:</b> overfit models have huge weight magnitudes that perfectly thread the training data. Regularization penalizes those huge weights, forcing simpler solutions.</p>
    <h4>L2 (Ridge)</h4>
    <p>Add <code>λ · Σ wᵢ²</code> to the loss. Larger weights cost more. Result: all weights shrink toward 0 smoothly.</p>
    <p>Geometric picture: solution must lie inside a circle.</p>
    <h4>L1 (Lasso)</h4>
    <p>Add <code>λ · Σ |wᵢ|</code> to the loss. Same idea but absolute value instead of square.</p>
    <p>Geometric picture: solution must lie inside a diamond → optimum often lies on a corner → some weights become exactly 0 → automatic feature selection.</p>
    <p><b>L1 vs L2 cheat:</b> L1 if you want sparse models (only some features matter). L2 if you want smooth shrinkage of all features.</p>
    <h4>Dropout (neural networks)</h4>
    <p>During training, randomly set p fraction of activations to 0 (e.g., p=0.1-0.5). Forces the network to not rely on any single neuron — like training many networks at once.</p>
    <p>Turn OFF at inference (model.eval() in PyTorch).</p>
    <h4>Early stopping</h4>
    <p>Watch validation loss. When it starts rising while train loss falls, stop training. Saves compute and is a form of regularization.</p>`},
    {h:"Metrics", body:`<table>
      <tr><td>Accuracy</td><td>(TP+TN)/N. Bad on imbalance.</td></tr>
      <tr><td>Precision</td><td>TP/(TP+FP)</td></tr>
      <tr><td>Recall</td><td>TP/(TP+FN)</td></tr>
      <tr><td>F1</td><td>2PR/(P+R)</td></tr>
      <tr><td>ROC-AUC</td><td>Threshold-independent</td></tr>
      <tr><td>PR-AUC</td><td>Better for imbalance</td></tr>
    </table>`},
    {h:"sklearn template", code:`from sklearn.model_selection import train_test_split, cross_val_score\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.ensemble import RandomForestClassifier, GradientBoostingClassifier\nfrom sklearn.metrics import roc_auc_score\n\nX_tr, X_te, y_tr, y_te = train_test_split(X, y, test_size=0.2, stratify=y, random_state=42)\nmodels = {\n  "logreg": Pipeline([("s",StandardScaler()),("c",LogisticRegression(max_iter=1000))]),\n  "rf": RandomForestClassifier(n_estimators=200, max_depth=8, random_state=42),\n  "gb": GradientBoostingClassifier(),\n}\nfor n, m in models.items():\n    cv = cross_val_score(m, X_tr, y_tr, cv=5, scoring="roc_auc").mean()\n    m.fit(X_tr, y_tr)\n    print(n, cv, roc_auc_score(y_te, m.predict_proba(X_te)[:,1]))`},
  ],
