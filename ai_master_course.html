<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'; frame-src 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>AI Zero → Hero · Interactive Course + Games</title>
<link rel="stylesheet" href="course/course.css">
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div class="app">
<header class="topbar" role="banner">
  <button class="hamburger" id="hamburger" onclick="toggleDrawer()" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <a class="brand" href="index.html" title="Back to the main site" style="text-decoration:none">⚡ AI Zero → Hero</a>
  <a class="home-link" href="index.html" title="Go to the main site" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;background:rgba(122,162,255,.12);border:1px solid rgba(122,162,255,.3);color:var(--accent);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;flex-shrink:0">← Main site</a>
  <div class="stats" role="group" aria-label="Player stats">
    <div class="stat lvl" aria-label="Level">Lv <b id="level">1</b></div>
    <div class="xp-bar" role="progressbar" aria-label="XP progress to next level" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="xp-bar"><div id="xp-bar-fill"></div></div>
    <div class="stat" aria-label="XP this level">XP <b id="xp">0</b> / <b id="xp-next">500</b></div>
    <div class="stat" aria-label="Day streak">🔥 Streak <b id="streak">0</b></div>
    <div class="stat" aria-label="Badges earned">🏆 Badges <b id="badge-count">0</b>/<b id="badge-total">0</b></div>
    <div class="stat timer-stat" aria-label="Focus timer">
      <button id="timer-btn" onclick="timerToggle()" style="background:transparent;border:none;color:var(--ink);cursor:pointer;font-size:14px;padding:0" title="Start 30-min focus session">▶</button>
      <select id="timer-len" onchange="timerSetLen(this.value)" aria-label="Session length" style="background:transparent;border:none;color:var(--ink);font-size:11px;cursor:pointer">
        <option value="25">25m</option>
        <option value="30" selected>30m</option>
        <option value="45">45m</option>
        <option value="60">60m</option>
      </select>
      <b id="timer-display">30:00</b>
    </div>
  </div>
</header>
<div class="body">
  <div class="drawer-backdrop" id="drawer-backdrop" onclick="toggleDrawer()"></div>
  <aside id="sidebar">
    <a href="index.html" title="Back to the main site" style="display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:10px;border-radius:8px;background:rgba(122,162,255,.1);border:1px solid rgba(122,162,255,.28);color:var(--accent);font-size:13px;font-weight:600;text-decoration:none">← Back to main site</a>
    <nav class="tabs">
      <button data-view="phases" class="active" onclick="switchView('phases')">Phases</button>
      <button data-view="games" onclick="switchView('games')">Games</button>
      <button data-view="review" onclick="switchView('review')">Review <span id="review-due-badge" style="display:none;background:var(--err);color:#fff;font-size:9px;padding:1px 5px;border-radius:99px;margin-left:2px"></span></button>
      <button data-view="portfolio" onclick="switchView('portfolio')">Portfolio</button>
      <button data-view="badges" onclick="switchView('badges')">Badges</button>
    </nav>
    <div id="sidebar-content"></div>
    <div class="tools">
      <button class="tool" onclick="exportProgress()">Export</button>
      <button class="tool" onclick="document.getElementById('import-file').click()">Import</button>
      <input id="import-file" type="file" accept="application/json" style="display:none" onchange="importProgress(event)">
      <button class="tool" onclick="resetProgress()">Reset</button>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--muted)">Progress auto-saves to browser. Export JSON for backup.</div>
  </aside>
  <div style="display:flex;flex-direction:column;flex:1;min-width:0">
    <div id="streak-banner" class="streak-banner" style="display:none;margin:14px 40px 0 40px" role="status" aria-live="polite"></div>
    <main id="main" role="main"></main>
  </div>
</div>
</div>
<div id="main-content" tabindex="-1" class="sr-only">main content landmark</div>
<nav class="mobile-nav" aria-label="Quick navigation">
  <button data-view="phases" onclick="switchView('phases');closeDrawer()" class="active"><span class="ico">📚</span><span>Phases</span></button>
  <button data-view="games" onclick="switchView('games');closeDrawer()"><span class="ico">🎮</span><span>Games</span></button>
  <button data-view="review" onclick="switchView('review');closeDrawer()"><span class="ico">🔁</span><span>Review</span><span id="mnav-review-dot" class="badge-dot" style="display:none"></span></button>
  <button data-view="portfolio" onclick="switchView('portfolio');closeDrawer()"><span class="ico">📦</span><span>Portfolio</span></button>
  <button data-view="badges" onclick="switchView('badges');closeDrawer()"><span class="ico">🏆</span><span>Badges</span></button>
</nav>
<div class="xp-pop" id="xp-pop" role="status" aria-live="polite"></div>
<div id="modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:22px;max-width:440px;width:92%">
    <h3 id="modal-title" style="margin-top:0">Confirm</h3>
    <p id="modal-body" style="color:var(--ink)"></p>
    <div id="modal-extra"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button id="modal-cancel" style="background:var(--panel2);color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer">Cancel</button>
      <button id="modal-ok" style="background:var(--accent);color:#0b0f17;border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-weight:600">OK</button>
    </div>
  </div>
</div>

<script src="course/content/c01-setup.js"></script>
<script src="course/content/c02-python.js"></script>
<script src="course/content/c03-first-app.js"></script>
<script src="course/content/c04-math.js"></script>
<script src="course/content/c05-python-ml.js"></script>
<script src="course/content/c06-classical-ml.js"></script>
<script src="course/content/c07-deep-learning.js"></script>
<script src="course/content/c08-nlp.js"></script>
<script src="course/content/c09-transformers.js"></script>
<script src="course/content/c10-pretrain.js"></script>
<script src="course/content/c11-finetune.js"></script>
<script src="course/content/c12-claude-apps.js"></script>
<script src="course/content/c13-rag.js"></script>
<script src="course/content/c14-agents.js"></script>
<script src="course/content/c15-mlops.js"></script>
<script src="course/content/c16-portfolio.js"></script>
<script src="course/engine.js"></script>
</body>
</html>
