{ id:11, title:"Phase 10 — RAG Systems", est:"18-28 hrs",
  intro:"LLMs only know what's in their training data, frozen at some past date. They don't know your company's docs, today's news, or your private notes. RAG (Retrieval-Augmented Generation) fixes this by fetching relevant info at query time and injecting it into the prompt.",
  lessons:[
    {h:"⚠️ Misconceptions to kill before reading further", body:`<div class="trap">
      <div class="wrong">❌ WRONG: "RAG is a special kind of model."</div>
      <div class="right">✅ RIGHT: RAG is a PATTERN, not a model. It's just: retrieve relevant text → paste into prompt → call regular LLM. The model is unchanged.</div>
    </div>
    <div class="trap">
      <div class="wrong">❌ WRONG: "Embedding similarity = semantic similarity."</div>
      <div class="right">✅ RIGHT: Embeddings approximate semantic similarity WITHIN A DOMAIN. Cross-domain (medical vs legal), or for exact strings (product codes, dates), they often fail. Use hybrid search.</div>
    </div>
    <div class="trap">
      <div class="wrong">❌ WRONG: "Bigger embedding dim = better retrieval."</div>
      <div class="right">✅ RIGHT: Quality of the embedding model > dimension count. A 1024-dim Voyage-3 beats a 4096-dim mediocre model. Try the cheap one first, measure recall.</div>
    </div>`},
    {h:"What RAG is and why it beats fine-tuning for most cases", body:`<p><b>Two ways to give an LLM new knowledge:</b></p>
    <ol>
      <li><b>Fine-tune</b>: bake the knowledge into model weights via training</li>
      <li><b>RAG</b>: keep the model frozen, look up relevant docs at query time, insert them into the prompt</li>
    </ol>
    <p><b>RAG wins when:</b></p>
    <ul>
      <li>Knowledge changes often (you don't want to re-train weekly)</li>
      <li>Need source citations ("according to doc X...")</li>
      <li>Knowledge is private/confidential (can encrypt at rest)</li>
      <li>You have lots of docs but each query only needs a few</li>
    </ul>
    <p><b>Fine-tune wins when:</b></p>
    <ul>
      <li>Teaching a behavior/style (tone, format) not facts</li>
      <li>Knowledge is stable and small enough to fit in weights</li>
      <li>Latency-critical (retrieval adds 100-500ms)</li>
    </ul>
    <p>Most production AI apps use RAG + sometimes fine-tune on top.</p>`},
    {h:"The RAG pipeline (6 steps)", body:`<ol>
      <li><b>Ingest</b>: load source docs (PDFs, web pages, Notion, code) and extract clean text</li>
      <li><b>Chunk</b>: split each doc into pieces small enough to fit in prompt context (e.g., 500-token chunks)</li>
      <li><b>Embed</b>: turn each chunk into a vector using an embedding model (Voyage, Cohere, OpenAI)</li>
      <li><b>Store</b>: save vectors + chunk text in a vector database (Qdrant, pgvector, Pinecone)</li>
      <li><b>Retrieve</b>: when user asks a question, embed the question, find top-k most similar chunks via vector search</li>
      <li><b>Generate</b>: paste the retrieved chunks into Claude's prompt as context, generate answer</li>
    </ol>
    <p><b>Steps 1-4 happen once</b> at ingestion. <b>Steps 5-6 happen per query</b>.</p>`},
    {h:"Chunking — why this is the make-or-break step", body:`<p><b>The dilemma:</b></p>
    <ul>
      <li>Chunks too small (50 tokens) → each chunk loses context. Splits "The customer churned because of..." across chunks.</li>
      <li>Chunks too large (4000 tokens) → retrieval fetches mostly irrelevant text. Wastes context window. Embeddings become "averages" of many topics → less precise.</li>
    </ul>
    <p><b>Sweet spot:</b> 200-800 tokens, with 50-100 token overlap between consecutive chunks.</p>
    <h4>Chunking strategies (in order of sophistication)</h4>
    <ul>
      <li><b>Fixed-size</b>: every N tokens. Simple, usually fine. Use for plain text.</li>
      <li><b>Recursive</b>: try splitting on paragraph breaks; if too big, sentence; if still too big, word. Preserves natural boundaries.</li>
      <li><b>Semantic</b>: use embeddings to find topic boundaries. Slower, occasionally better.</li>
      <li><b>Structural</b>: respect markdown headings, code blocks, tables. Critical for technical docs — never split a function in half.</li>
    </ul>
    <p><b>Always attach metadata</b> to each chunk: source URL, doc title, page number, section heading. Lets you cite sources back to the user.</p>`},
    {h:"Hybrid + reranker", body:`<ul>
      <li>Vector alone misses keywords (proper nouns, codes)</li>
      <li>BM25 sparse catches them</li>
      <li>Merge via reciprocal rank fusion</li>
      <li>Reranker (cross-encoder): top-50 → top-5</li>
    </ul>`},
    {h:"Contextual retrieval (Anthropic)", body:"<p>Prepend LLM-generated chunk context before embedding. ~35% fewer retrieval failures.</p>", code:`context_prompt = f"""<document>{whole_doc}</document>\n<chunk>{chunk}</chunk>\nProvide a short context (1-2 sentences) situating this chunk."""\ncontext = client.messages.create(\n    model="claude-haiku-4-5-20251001",\n    max_tokens=100,\n    messages=[{"role":"user","content":context_prompt}],\n).content[0].text\naugmented_chunk = context + "\\n\\n" + chunk  # embed this`},
    {h:"Minimal RAG", code:`from qdrant_client import QdrantClient\nfrom qdrant_client.models import Distance, VectorParams, PointStruct\nimport voyageai, anthropic\n\nvo = voyageai.Client(); qd = QdrantClient(":memory:"); cl = anthropic.Anthropic()\nqd.recreate_collection("docs", vectors_config=VectorParams(size=1024, distance=Distance.COSINE))\n\nvecs = vo.embed(chunks, model="voyage-3", input_type="document").embeddings\nqd.upsert("docs", [PointStruct(id=i, vector=v, payload={"text":t}) for i,(v,t) in enumerate(zip(vecs, chunks))])\n\ndef ask(q):\n    qv = vo.embed([q], model="voyage-3", input_type="query").embeddings[0]\n    hits = qd.search("docs", query_vector=qv, limit=5)\n    ctx = "\\n\\n".join(h.payload["text"] for h in hits)\n    return cl.messages.create(\n        model="claude-sonnet-4-6", max_tokens=1024,\n        system="Answer ONLY using provided context. If not in context, say so.",\n        messages=[{"role":"user","content":f"<context>{ctx}</context>\\n\\nQ: {q}"}],\n    ).content[0].text`},
    {h:"RAG evals", body:`<ul>
      <li>Recall@k on retrieval</li>
      <li>Faithfulness: claims supported by context? (LLM-judge)</li>
      <li>Relevance: does it answer the question?</li>
      <li><a href="https://github.com/explodinggradients/ragas" target="_blank">RAGAS</a></li>
    </ul>`},
  ],
  quiz:[
    {type:"mcq", q:"Query with product codes → wrong chunks. Fix?", options:["Bigger model","Hybrid: vector + BM25","Larger context","Different dim"], answer:1, explain:"Embeddings blur exact strings. BM25 catches tokens. Use both."},
    {type:"mcq", q:"Why reranker after retrieval?", options:["Cheaper","Cross-encoders too slow on millions but great on top-50 → top-K","Qdrant req","Improves embeddings"], answer:1, explain:"Bi-encoder ANN fast/approximate. Cross-encoder reads (q, chunk) pairs jointly → accurate."},
    {type:"mcq", q:"Anthropic contextual retrieval?", options:["Bigger DB","LLM-generated chunk context prepended before embedding","Reranking","Hybrid"], answer:1, explain:"Adds situating context to each chunk → embeddings carry richer signal → 35% fewer failures."},
    {type:"mcq", q:"500-token chunks vs 2000-token chunks — tradeoff?", options:["Same","Small: better precision (less noise per chunk), worse recall (concept may span chunks). Large: opposite + more $ per query","Larger always better","Smaller always better"], answer:1, explain:"Trade precision/recall. Overlap (50-100 tokens) helps. Test on your golden set."},
    {type:"mcq", q:"Vector embeddings vs BM25 — semantic difference?", options:["Same","Embeddings = dense vectors capturing meaning (paraphrase tolerant); BM25 = sparse token-frequency match (exact-string strong)","Embeddings are faster","BM25 is dense"], answer:1, explain:"Why hybrid wins: 'big dog' embeds near 'large canine' (vector) but 'product code XJ-487' needs exact match (BM25). Use both."},
    {type:"short", q:"Confident-but-wrong RAG. Reduce hallucination?", model:"(1) Prompt: 'Answer ONLY from context; else say unknown.' (2) Cite source chunk per claim. (3) Lower temp. (4) Improve retrieval — measure recall@k on golden set. (5) Verifier step: 2nd LLM checks support. (6) Show users sources. (7) Extended thinking for hard queries. (8) Add tool ('search_web') when context insufficient.", rubric:["grounding prompt","citations","fix retrieval","sources","verifier"]},
  ],
  project:{title:"Phase 10 deliverable", steps:["RAG over your PDFs, deployed","Contextual retrieval, measure recall@5 lift","Hybrid + reranker"]}
},
{ id:12, title:"Phase 11 — AI Agents", est:"25-40 hrs",
  intro:"An <b>agent</b> = LLM + tools + a loop where the LLM decides what to do next based on previous results. This is where AI stops being a chatbot and starts being a worker.",
  lessons:[
    {h:"⚠️ Misconceptions to kill before reading further", body:`<div class="trap">
      <div class="wrong">❌ WRONG: "LLM agents reason and plan."</div>
      <div class="right">✅ RIGHT: LLMs do next-token prediction. The OUTPUT often LOOKS like planning, but the model has no persistent goal or world model. This is why agents loop forever calling the same tool — they don't "realize" they're stuck.</div>
      <div class="why">Implication: enforce step caps, repeat detection, cost limits in YOUR HARNESS. Never expect the model to self-regulate.</div>
    </div>
    <div class="trap">
      <div class="wrong">❌ WRONG: "More tools = better agent."</div>
      <div class="right">✅ RIGHT: Tool count above ~8-12 confuses the model. Quality + clarity of tool descriptions matter more than count. Start with 3-5 well-described tools.</div>
    </div>
    <div class="trap">
      <div class="wrong">❌ WRONG: "Agentic = autonomous = good."</div>
      <div class="right">✅ RIGHT: Agentic loops add latency, cost, and failure modes. Use the simplest pattern that works: single LLM call > tool use > loop. Only agentify when the LLM genuinely must decide ordering at runtime.</div>
    </div>`},
    {h:"What an agent actually is (vs hype)", body:`<p>"Agent" is overused. Concrete definition: <b>an LLM in a loop where, at each step, the model can call tools, get back results, and decide what to do next — until it produces a final answer.</b></p>
    <p><b>The minimal loop:</b></p>
    <ol>
      <li>User gives a task: "Find the latest version of Python and write a hello world"</li>
      <li>LLM emits a tool call: <code>web_search("latest Python version")</code></li>
      <li>You execute the tool, get back: "Python 3.13"</li>
      <li>LLM emits another tool call: <code>write_file("hello.py", "print('hi')")</code></li>
      <li>You execute, return success</li>
      <li>LLM emits <code>end_turn</code> with: "Done. Latest is 3.13, file written."</li>
    </ol>
    <p>That's it. No magic. The LLM is the planner; your code is the executor.</p>
    <p><b>When you need an agent (vs a single LLM call):</b></p>
    <ul>
      <li>The task requires multiple steps with unknown ordering</li>
      <li>Each step's output determines the next step</li>
      <li>External info (web, files, APIs) needed at runtime</li>
    </ul>
    <p><b>When you DON'T need one:</b> simple Q&A, single classification, fixed multi-step pipeline. Don't agentify what one prompt + maybe one tool call can do.</p>
    <div class="callout">Required reading: Anthropic's <a href="https://www.anthropic.com/research/building-effective-agents" target="_blank">Building Effective Agents</a>. Defines core patterns (routing, parallelization, orchestrator-workers, evaluator-optimizer).</div>`},
    {h:"Raw agent loop (SAFE — no shell=True)", body:`<div class="callout warn"><b>SECURITY:</b> never pass model output to <code>shell=True</code>. Use <code>shlex.split</code> + allowlist, or sandbox (Docker, Modal). Below: read-only filesystem + allowlisted commands.</div>`, code:`import anthropic, subprocess, shlex, pathlib\nclient = anthropic.Anthropic()\n\nALLOWED_CMDS = {"ls", "cat", "wc", "grep", "head", "tail", "python", "pytest"}\nSAFE_ROOT = pathlib.Path("./workspace").resolve()\n\nTOOLS = [\n    {"name":"read_file","description":"Read a file under ./workspace",\n     "input_schema":{"type":"object","properties":{"path":{"type":"string"}},"required":["path"]}},\n    {"name":"run","description":"Run an allowlisted command (no shell). Args as list.",\n     "input_schema":{"type":"object","properties":{"argv":{"type":"array","items":{"type":"string"}}},"required":["argv"]}},\n]\n\ndef safe_path(p):\n    full = (SAFE_ROOT / p).resolve()\n    if SAFE_ROOT not in full.parents and full != SAFE_ROOT:\n        raise ValueError("path escapes workspace")\n    return full\n\ndef exec_tool(name, args):\n    try:\n        if name == "read_file":\n            return safe_path(args["path"]).read_text()[:8000]\n        if name == "run":\n            argv = args["argv"]\n            if not argv or argv[0] not in ALLOWED_CMDS:\n                return f"command not allowed: {argv[:1]}"\n            r = subprocess.run(argv, capture_output=True, text=True, timeout=15, cwd=SAFE_ROOT)\n            return (r.stdout + r.stderr)[:4000]\n        return f"unknown tool {name}"\n    except Exception as e:\n        return f"tool error: {e}"\n\ndef run_agent(task, max_steps=10, max_dollars=0.50):\n    messages = [{"role":"user","content":task}]\n    spent = 0.0; seen = set()\n    for step in range(max_steps):\n        resp = client.messages.create(\n            model="claude-opus-4-7", max_tokens=4096,\n            tools=TOOLS, messages=messages,\n        )\n        # cost cap (Opus 4.7 illustrative; verify pricing live)\n        spent += resp.usage.input_tokens*15e-6 + resp.usage.output_tokens*75e-6\n        if spent > max_dollars: return f"cost cap hit at step {step}"\n        messages.append({"role":"assistant","content":resp.content})\n        if resp.stop_reason == "end_turn":\n            return next((b.text for b in resp.content if b.type=="text"), "")\n        tool_results = []\n        for b in resp.content:\n            if b.type == "tool_use":\n                sig = (b.name, repr(b.input))\n                if sig in seen:\n                    tool_results.append({"type":"tool_result","tool_use_id":b.id,\n                                         "content":"You already called this. Try a different approach."})\n                else:\n                    seen.add(sig)\n                    tool_results.append({"type":"tool_result","tool_use_id":b.id,\n                                         "content":exec_tool(b.name, b.input)})\n        messages.append({"role":"user","content":tool_results})\n    return "max steps reached"`},
    {h:"Claude Agent SDK", body:`<p>Anthropic's official agent SDK — production loop, tool exec, parallel, observability. Docs at <a href="https://docs.anthropic.com/" target="_blank">docs.anthropic.com</a>.</p>`},
    {h:"Patterns", body:`<table>
      <tr><th>Pattern</th><th>When</th></tr>
      <tr><td>Single call</td><td>Q&A, classify</td></tr>
      <tr><td>Tool use (1-2)</td><td>Fetch + answer</td></tr>
      <tr><td>Agent loop</td><td>Multi-step, runtime decisions</td></tr>
      <tr><td>Router</td><td>LLM picks subroutine</td></tr>
      <tr><td>Parallelization</td><td>Independent subtasks</td></tr>
      <tr><td>Orchestrator-workers</td><td>Manager spawns workers</td></tr>
      <tr><td>Evaluator-optimizer</td><td>Produce → grade → loop</td></tr>
    </table>
    <div class="callout warn">Start simple. Don't agentify what 1 prompt solves.</div>`},
    {h:"Failure modes", body:`<ul>
      <li>Infinite loop → max_steps cap + repeat detection</li>
      <li>Hallucinated tool → validate name</li>
      <li>Bad schema → let model retry with error</li>
      <li>Cost runaway → per-task token/$ cap</li>
      <li>Security → never shell=True on untrusted; sandbox</li>
    </ul>`},
    {h:"Observability", body:`<ul>
      <li>Log (prompt, response, tools, tokens, latency, $) per step</li>
      <li><a href="https://langfuse.com" target="_blank">Langfuse</a>, <a href="https://helicone.ai" target="_blank">Helicone</a>, or SQLite+dashboard</li>
    </ul>`},
  ],
  quiz:[
    {type:"mcq", q:"Agent stuck repeating same tool. Fix?", options:["Bigger model","Detect repeated (tool,args) → break loop with 'try different' nudge","More steps","No streaming"], answer:1, explain:"Cheapest reliable fix. Bigger model only marginal."},
    {type:"mcq", q:"When single call beats agent?", options:["Never","Whenever task decomposes into one tool + one response","Always","Chat only"], answer:1, explain:"Agentic loops add latency/cost/failures. Only when LLM must decide ordering."},
    {type:"mcq", q:"Where enforce cost caps?", options:["Prompt","Harness — per-step counter, hard kill","Claude itself","Cannot"], answer:1, explain:"Never trust model. Harness owns the loop."},
    {type:"short", q:"Web research agent failure modes?", model:"(1) Max 15 steps. (2) Step 30s + total 5min timeout. (3) $0.50 cap → abort partial. (4) Repeat query 3x → nudge 'broaden'. (5) try/except per fetch. (6) Truncate page to 5k tokens. (7) Validator scores report; 1 retry on fail. (8) SQLite trace. (9) Sandbox (no localhost, respect robots). (10) Stream partial progress.", rubric:["step/time/cost caps","repeat detection","error handling","truncation","logging","sandbox"]},
  ],
  project:{title:"Phase 11 deliverable", steps:["Research agent: topic → report","Code review agent on PR diff","Observability dashboard"]}
},
{ id:13, title:"Phase 12 — MLOps / AI Engineering", est:"30-45 hrs",
  intro:"Notebooks don't pay rent. This phase turns your prototypes into deployed services that real users hit — with auth, monitoring, security, and cost control.",
  lessons:[
    {h:"What MLOps actually means for AI engineers", body:`<p><b>MLOps = the operations side of ML</b> — taking a trained model and making it a reliable service.</p>
    <p><b>What you need to know:</b></p>
    <ol>
      <li><b>Serving</b>: how to run your model behind an API at high throughput</li>
      <li><b>Wrapping</b>: REST API, auth, rate limits, error handling</li>
      <li><b>Containers</b>: Docker so it runs anywhere</li>
      <li><b>Deployment</b>: cloud platforms (Fly.io, Railway, Modal, Cloud Run) or your own infra</li>
      <li><b>Monitoring</b>: logs, metrics (latency, error rate, cost), alerts</li>
      <li><b>Security</b>: prompt injection defense, PII handling, secret management</li>
    </ol>
    <p>You're not expected to become a DevOps expert. Master enough to ship one service end-to-end. The skills generalize.</p>`},
    {h:"Serving open LLMs — choose the right tool", body:`<p>If you're using Claude API, you don't need to "serve" anything — Anthropic runs the model. If you're deploying an open model (Llama, Qwen, Mistral) on your own GPU, you need a serving framework:</p>
    <table>
      <tr><th>Tool</th><th>Use case</th><th>Why</th></tr>
      <tr><td><b>vLLM</b></td><td>Production high-throughput</td><td>PagedAttention + continuous batching → ~5-20× throughput vs naive HF generate. OpenAI-compatible API. Default for serving 7B+ models.</td></tr>
      <tr><td><b>TGI</b></td><td>Production HF stack</td><td>HuggingFace's official server. Mature, similar perf to vLLM.</td></tr>
      <tr><td><b>Ollama</b></td><td>Local single-user dev</td><td>Easy install, runs quantized models. One-command setup. Not for prod.</td></tr>
      <tr><td><b>llama.cpp</b></td><td>CPU / edge devices</td><td>Pure C++, runs on Raspberry Pi, phones. GGUF quantized weights.</td></tr>
    </table>
    <p><b>What makes vLLM fast:</b></p>
    <ul>
      <li><b>Continuous batching</b>: instead of waiting for a fixed batch to fill, vLLM packs new requests into the running batch every step. GPU stays at near 100% utilization.</li>
      <li><b>PagedAttention</b>: KV cache is allocated in pages (like virtual memory), not contiguously. Allows variable-length sequences without wasted memory.</li>
    </ul>`, code:`pip install vllm

python -m vllm.entrypoints.openai.api_server \\
  --model meta-llama/Llama-3.1-8B-Instruct \\
  --dtype bfloat16 \\
  --max-model-len 8192 \\
  --port 8000

# Then call as if it were OpenAI:
# curl http://localhost:8000/v1/chat/completions ...`},
    {h:"FastAPI wrapper", code:`from fastapi import FastAPI, HTTPException, Header\nfrom pydantic import BaseModel\nimport anthropic, os\nfrom slowapi import Limiter\nfrom slowapi.util import get_remote_address\n\napp = FastAPI()\nlimiter = Limiter(key_func=get_remote_address)\nclient = anthropic.Anthropic()\nKEYS = set(os.getenv("APP_KEYS","").split(","))\n\nclass Q(BaseModel): question: str\n\n@app.post("/ask")\n@limiter.limit("30/minute")\nasync def ask(q: Q, request, x_api_key: str = Header(None)):\n    if x_api_key not in KEYS: raise HTTPException(401, "bad key")\n    resp = client.messages.create(model="claude-sonnet-4-6", max_tokens=1024,\n        messages=[{"role":"user","content":q.question}])\n    return {"answer":resp.content[0].text, "tokens":resp.usage.output_tokens}`},
    {h:"Dockerfile", code:`FROM python:3.11-slim\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir -r requirements.txt\nCOPY . .\nCMD ["uvicorn","app:app","--host","0.0.0.0","--port","8080"]`},
    {h:"Observability", body:`<ul>
      <li>Structured JSON logs, request_id correlation</li>
      <li>Metrics: req/s, p50/p95/p99, error rate, tokens, $ — Prometheus + Grafana</li>
      <li>LLM-specific: Langfuse/Helicone — traces, prompt versioning, evals</li>
      <li>Alerts: cost spike, latency degradation, error > 1%</li>
    </ul>`},
    {h:"Security checklist", body:`<ul>
      <li><b>Prompt injection</b>: untrusted text overrides system → separator markers, output validation, no privileged tool calls without confirmation</li>
      <li><b>Tool sandbox</b>: never exec untrusted (Docker, Modal sandbox)</li>
      <li><b>PII/secrets</b>: scrub before LLM call</li>
      <li><b>Auth + rate limits</b> per user/tenant</li>
      <li><b>Cost cap</b> per tenant monthly</li>
      <li><b>Red-team your own app weekly</b></li>
    </ul>`},
    {h:"Linux/shell bridge (you'll deploy to Linux servers)", body:`<p>Your laptop is Windows but production runs Linux. Learn enough shell to operate.</p>
    <h4>20 commands you actually need</h4>
    <table>
      <tr><th>Command</th><th>Does</th></tr>
      <tr><td><code>ls -la</code></td><td>List files with details + hidden</td></tr>
      <tr><td><code>cd /path</code></td><td>Change directory</td></tr>
      <tr><td><code>pwd</code></td><td>Print working directory</td></tr>
      <tr><td><code>cat file</code></td><td>Print file contents</td></tr>
      <tr><td><code>less file</code></td><td>Page through long file (q to quit)</td></tr>
      <tr><td><code>head -n 20 file</code> / <code>tail -f log</code></td><td>First N lines / follow log live</td></tr>
      <tr><td><code>grep -r "pattern" .</code></td><td>Recursive search in dir</td></tr>
      <tr><td><code>find . -name "*.py"</code></td><td>Find files matching glob</td></tr>
      <tr><td><code>cp src dst</code> / <code>mv src dst</code> / <code>rm file</code></td><td>Copy/move/delete</td></tr>
      <tr><td><code>chmod +x script.sh</code></td><td>Make executable</td></tr>
      <tr><td><code>ps aux | grep python</code></td><td>List processes matching</td></tr>
      <tr><td><code>kill -9 PID</code></td><td>Force-kill process by ID</td></tr>
      <tr><td><code>top</code> / <code>htop</code></td><td>Live CPU/mem dashboard</td></tr>
      <tr><td><code>df -h</code></td><td>Disk usage human-readable</td></tr>
      <tr><td><code>nvidia-smi</code></td><td>GPU utilization, mem, processes</td></tr>
      <tr><td><code>ssh user@host</code></td><td>Remote login</td></tr>
      <tr><td><code>scp local user@host:remote</code></td><td>Copy files over SSH</td></tr>
      <tr><td><code>systemctl status myapp</code></td><td>Check systemd service</td></tr>
      <tr><td><code>journalctl -u myapp -f</code></td><td>Tail service logs live</td></tr>
      <tr><td><code>curl -X POST localhost:8000/ask -d '...'</code></td><td>Hit an HTTP endpoint</td></tr>
    </table>
    <h4>Pipes + redirects (the Unix superpower)</h4>
    <pre><code># pipe one command's output to next
ps aux | grep python | wc -l        # count python processes

# redirect stdout (overwrite vs append)
python train.py > output.log
python train.py >> output.log 2>&1  # both stdout+stderr appended

# background process with output to file
nohup python serve.py > server.log 2>&1 &
</code></pre>
    <h4>Permissions: chmod numeric</h4>
    <pre><code>chmod 755 file   # rwx r-x r-x (owner all, others read+exec)
chmod 644 file   # rw- r-- r-- (owner rw, others read)
chmod 600 file   # rw- --- --- (owner only — use for API keys, SSH keys)
</code></pre>
    <h4>WSL: get Linux on Windows free</h4>
    <p>Run as admin: <code>wsl --install</code>. Installs Ubuntu in ~2 min. Open terminal → "Ubuntu" → you're in Linux without VM overhead. Practice every Linux command above here.</p>`},
    {h:"Speculative decoding — 2-3× faster inference", body:`<p><b>The bottleneck:</b> LLM inference is autoregressive — generate one token, then the next. Each token = full forward pass on a 70B model = ~50ms. Slow.</p>
    <p><b>The trick:</b> use a small <b>draft model</b> to predict next K tokens cheaply, then have the big model verify all K in <b>one</b> forward pass (it does parallel compute on the K candidates).</p>
    <ol>
      <li>Draft model (1B) generates 4 candidate tokens — cheap</li>
      <li>Big model (70B) does ONE forward pass on prompt + 4 candidates</li>
      <li>For each position, check if big model's top prediction matches draft</li>
      <li>Accept matched prefix; from first mismatch, take big model's prediction</li>
      <li>Best case: all 4 match → 4× speedup. Worst case: 0 match → same as no spec.</li>
    </ol>
    <p><b>Expected:</b> 2-3× wall-clock for typical text. No quality change (output is mathematically identical to big model alone).</p>
    <pre><code>python -m vllm.entrypoints.openai.api_server \\
  --model meta-llama/Llama-3.1-70B-Instruct \\
  --speculative-model meta-llama/Llama-3.2-1B-Instruct \\
  --num-speculative-tokens 4 \\
  --dtype bfloat16
</code></pre>`},
    {h:"Quantization (GPTQ / AWQ / GGUF / NF4)", body:`<p>Weights default to bf16 (2 bytes each). A 70B model = 140GB. Doesn't fit on a 24GB GPU. Quantization shrinks weights to lower precision, trading minor quality loss for huge memory savings.</p>
    <h4>Format comparison</h4>
    <table>
      <tr><th>Format</th><th>Bits/weight</th><th>70B size</th><th>Quality loss</th><th>Tool</th></tr>
      <tr><td>bf16 (baseline)</td><td>16</td><td>140 GB</td><td>0%</td><td>—</td></tr>
      <tr><td>int8</td><td>8</td><td>70 GB</td><td>&lt; 1%</td><td>bitsandbytes</td></tr>
      <tr><td><b>GPTQ 4-bit</b></td><td>4</td><td>35 GB</td><td>~1-2%</td><td>AutoGPTQ; standard GPU inference</td></tr>
      <tr><td><b>AWQ 4-bit</b></td><td>4</td><td>35 GB</td><td>~1-2%</td><td>AutoAWQ; sometimes better than GPTQ</td></tr>
      <tr><td><b>GGUF (Q4_K_M)</b></td><td>~4.5</td><td>~40 GB</td><td>~1-2%</td><td>llama.cpp; best for Mac/CPU/edge</td></tr>
      <tr><td>NF4 (QLoRA)</td><td>4</td><td>35 GB</td><td>~1-2%</td><td>bitsandbytes; used during fine-tuning</td></tr>
    </table>
    <h4>When to use which</h4>
    <ul>
      <li><b>Inference on GPU</b>: AWQ or GPTQ 4-bit. Test on your golden set first.</li>
      <li><b>Inference on Mac/CPU</b>: GGUF via llama.cpp or Ollama. Q4_K_M is the sweet spot.</li>
      <li><b>Fine-tuning on consumer GPU</b>: NF4 + LoRA adapters (= QLoRA).</li>
    </ul>
    <h4>Loading a pre-quantized model</h4>
    <pre><code>from transformers import AutoModelForCausalLM, AutoTokenizer

model = AutoModelForCausalLM.from_pretrained(
    "TheBloke/Llama-3.1-70B-Instruct-GPTQ",
    device_map="auto",
)
tok = AutoTokenizer.from_pretrained("TheBloke/Llama-3.1-70B-Instruct-GPTQ")
inputs = tok("Hello", return_tensors="pt").to("cuda")
out = model.generate(**inputs, max_new_tokens=50)
print(tok.decode(out[0]))
</code></pre>`},
  ],
  quiz:[
    {type:"mcq", q:"vLLM > naive HF generate() because:", options:["Lighter deps","Continuous batching + PagedAttention → 5-20× throughput","Smaller models","Free"], answer:1, explain:"Naive generate idles GPU. vLLM packs requests + paged KV cache → utilization."},
    {type:"mcq", q:"Most important LLM-specific metric?", options:["CPU","Tokens (in+out) and $ per request","Disk","Key count"], answer:1, explain:"Cost surprises. A token-doubling bug 10× your bill silently. Track + alert."},
    {type:"mcq", q:"Prompt injection defense?", options:["Trust model refuses","Defense in depth: sandbox, output validation, separators, no priv escalation","Bigger model","Longer system"], answer:1, explain:"No full defense. Limit blast radius — model CAN be tricked; ensure consequences small."},
    {type:"short", q:"50 req/s, p50 200ms but p99 4s. Investigate?", model:"P99 4s = (1) Long outputs blocking batch → cap max_tokens, stream. (2) Cache misses on rare prompts. (3) GPU memory near limit → batch shrinks. nvidia-smi. (4) Long-input variance → bucket. (5) Thermal throttle. (6) Slow client streaming back-pressure. Fixes: cap tokens, increase --max-num-seqs and --gpu-memory-utilization, timeout, autoscale on queue depth.", rubric:["long outputs","memory","input variance","back-pressure","autoscale"]},
  ],
  project:{title:"Phase 12 deliverable", steps:["vLLM self-host open LLM","FastAPI + auth + rate limit + Docker","Grafana latency + cost dashboard","Red-team writeup"]}
},
{ id:14, title:"Phase 13 — Papers, Portfolio, Brand", est:"Ongoing",
  intro:"Job leverage = public proof + paper literacy + opinions.",
  lessons:[
    {h:"Must-read papers", body:`<ol>
      <li>Vaswani 2017 — Attention Is All You Need</li>
      <li>Devlin 2018 — BERT</li>
      <li>Radford 2019 — GPT-2</li>
      <li>Brown 2020 — GPT-3</li>
      <li>Kaplan 2020 — Scaling Laws</li>
      <li>Hoffmann 2022 — Chinchilla</li>
      <li>Ouyang 2022 — InstructGPT</li>
      <li>Bai 2022 — Constitutional AI (Anthropic)</li>
      <li>Hu 2021 — LoRA</li>
      <li>Dettmers 2023 — QLoRA</li>
      <li>Rafailov 2023 — DPO</li>
      <li>Lewis 2020 — RAG</li>
      <li>Dao 2022 — FlashAttention</li>
      <li>Jiang 2024 — Mixtral MoE</li>
      <li>Anthropic Claude 3/3.5/4 model cards</li>
    </ol>`},
    {h:"Mechanistic interpretability (Anthropic's flagship direction)", body:`<p><b>Why care:</b> if you're using Claude or building safety-critical AI, you should understand the research direction that opens the black box. Anthropic's interp team is one of the largest in industry; the field is hiring.</p>
    <h4>Core idea</h4>
    <p>Mechanistic interpretability tries to reverse-engineer neural networks into human-understandable algorithms. Not "the model has 175B params and outputs token T"; instead "this attention head copies entity names, this MLP layer detects negation".</p>
    <h4>Key concepts</h4>
    <ul>
      <li><b>Features</b>: directions in activation space that correspond to human concepts (e.g., "is a person's name", "is positive sentiment").</li>
      <li><b>Circuits</b>: groups of attention heads + MLPs that together implement an algorithm (e.g., indirect object identification).</li>
      <li><b>Superposition</b>: networks compress more features than they have neurons by representing features as overlapping directions.</li>
      <li><b>Sparse autoencoders (SAEs)</b>: trained to decompose model activations into sparse interpretable features. Anthropic's main tool. Has scaled to Claude 3 Sonnet — Anthropic reported finding millions of features.</li>
      <li><b>Activation patching</b>: swap activations from one input into another, see what changes. Identifies which components are causally responsible.</li>
      <li><b>Causal interventions</b>: ablate (zero out) or boost specific features to test hypotheses.</li>
    </ul>
    <h4>Must-read posts (free, no paywall)</h4>
    <ul>
      <li>Anthropic — <i>Scaling Monosemanticity</i> (2024): SAEs on Claude 3 Sonnet, "Golden Gate Bridge feature"</li>
      <li>Anthropic — <i>Towards Monosemanticity</i> (2023): SAEs on small models</li>
      <li>Olah et al. — <i>Zoom In: An Introduction to Circuits</i> (Distill.pub)</li>
      <li>Nanda — <i>An Extremely Opinionated Annotated List of Favorite Mechanistic Interpretability Papers</i></li>
      <li>Anthropic's Interpretability team blog: anthropic.com/research</li>
    </ul>
    <h4>Hands-on starting points</h4>
    <ul>
      <li><a href="https://github.com/TransformerLensOrg/TransformerLens" target="_blank">TransformerLens</a> — Python library for poking inside HF transformer models (extract activations, patch, ablate)</li>
      <li><a href="https://github.com/jbloomAus/SAELens" target="_blank">SAELens</a> — train and analyze sparse autoencoders</li>
      <li>Neel Nanda's tutorial notebooks (Colab-runnable)</li>
    </ul>
    <h4>Why it's a job market angle</h4>
    <p>Anthropic, DeepMind, OpenAI, Goodfire, METR, MATS hire interp researchers. Small field, high signal, distinct from "ML engineer". A blog post replicating one paper's result = visible portfolio piece.</p>`},
    {h:"3-pass paper reading", body:`<ol>
      <li>5 min: title, abstract, intro, conclusions, figures</li>
      <li>1 hr: full read, ignore proofs, 1-paragraph summary</li>
      <li>2-3 hr: re-derive math, replicate key result</li>
    </ol>`},
    {h:"📄 Structured paper summaries (read these BEFORE the originals)", body:`<p>Skim a summary first → know what to look for → read the actual paper with focus. Each summary: 1-line claim, key insight, why it matters, what to memorize.</p>
    <details class="try"><summary>1. Attention Is All You Need (Vaswani 2017)</summary><div class="ans">
      <b>Claim:</b> attention alone, no RNNs, suffices for translation — at higher quality and parallelism.<br>
      <b>Insight:</b> self-attention <code>softmax(QK^T/√d_k)V</code> + multi-head + positional encoding. Encoder-decoder.<br>
      <b>Why matters:</b> founding paper of every modern LLM. Read 3 times.<br>
      <b>Memorize:</b> scaled dot-product attention formula, multi-head intuition, why /√d_k.
    </div></details>
    <details class="try"><summary>2. BERT (Devlin 2018)</summary><div class="ans">
      <b>Claim:</b> bidirectional transformer pretrained on masked LM + next sentence prediction → SOTA on many NLU tasks.<br>
      <b>Insight:</b> encoder-only transformer, [MASK] + [CLS] tokens, fine-tune on downstream tasks.<br>
      <b>Why matters:</b> ushered transfer-learning era. Direct ancestor of all encoder models.<br>
      <b>Memorize:</b> MLM objective, why bidirectional helps understanding but not generation.
    </div></details>
    <details class="try"><summary>3. GPT-2 (Radford 2019)</summary><div class="ans">
      <b>Claim:</b> a decoder-only LM trained on web text shows zero-shot transfer to many tasks.<br>
      <b>Insight:</b> just scale + good data + next-token prediction → emergent multi-task capability.<br>
      <b>Why matters:</b> the "GPT" recipe. Karpathy reproduces this exact architecture.<br>
      <b>Memorize:</b> 1.5B params, byte-pair encoding, WebText dataset, layer-norm placement (pre vs post).
    </div></details>
    <details class="try"><summary>4. GPT-3 / "Language Models are Few-Shot Learners" (Brown 2020)</summary><div class="ans">
      <b>Claim:</b> 175B param LM does in-context learning — given a few examples in prompt, it generalizes without weight updates.<br>
      <b>Insight:</b> scale unlocks emergent behaviors invisible at smaller sizes.<br>
      <b>Why matters:</b> birthplace of "prompt engineering" as a field.<br>
      <b>Memorize:</b> few-shot vs zero-shot vs fine-tune, the emergent abilities concept.
    </div></details>
    <details class="try"><summary>5. Scaling Laws (Kaplan 2020)</summary><div class="ans">
      <b>Claim:</b> loss scales as predictable power laws of compute, dataset size, parameters.<br>
      <b>Insight:</b> can predict model quality before training. Bigger is better, predictably.<br>
      <b>Why matters:</b> turned ML from art to engineering. Justified billion-dollar training runs.<br>
      <b>Memorize:</b> L ∝ N^-α, log-log plots, compute-optimal frontier.
    </div></details>
    <details class="try"><summary>6. Chinchilla (Hoffmann 2022)</summary><div class="ans">
      <b>Claim:</b> for fixed compute, scale N and D proportionally. ~20 tokens/param is optimal.<br>
      <b>Insight:</b> GPT-3 was massively undertrained. A 70B model with 1.4T tokens beats a 175B model with 300B tokens at the same compute.<br>
      <b>Why matters:</b> changed how Llama, Mistral, and modern open models size their training.<br>
      <b>Memorize:</b> ~20 tokens/param, the compute formula C ≈ 6·N·D.
    </div></details>
    <details class="try"><summary>7. InstructGPT (Ouyang 2022)</summary><div class="ans">
      <b>Claim:</b> RLHF (SFT → reward model → PPO) makes GPT-3 actually useful as an assistant.<br>
      <b>Insight:</b> alignment via human preferences > raw scaling for usefulness.<br>
      <b>Why matters:</b> the recipe behind ChatGPT. Read before Phase 8.<br>
      <b>Memorize:</b> 3-stage pipeline, KL penalty to SFT, reward model training.
    </div></details>
    <details class="try"><summary>8. Constitutional AI (Bai/Anthropic 2022)</summary><div class="ans">
      <b>Claim:</b> replace expensive human feedback with AI feedback guided by written principles.<br>
      <b>Insight:</b> a model can critique + revise its own outputs against a constitution → scalable alignment.<br>
      <b>Why matters:</b> Anthropic's foundational alignment paper. Behind Claude's safety training.<br>
      <b>Memorize:</b> RLAIF vs RLHF, red-teaming + revision loop, role of the constitution.
    </div></details>
    <details class="try"><summary>9. LoRA (Hu 2021)</summary><div class="ans">
      <b>Claim:</b> fine-tune low-rank update B·A instead of full weights. ~100× fewer trainable params, same quality.<br>
      <b>Insight:</b> fine-tuning's "true rank" is low — most weight changes lie in a small subspace.<br>
      <b>Why matters:</b> made fine-tuning 7B+ models feasible on consumer GPU.<br>
      <b>Memorize:</b> W' = W + (α/r)·B·A, the α/r scaling factor.
    </div></details>
    <details class="try"><summary>10. QLoRA (Dettmers 2023)</summary><div class="ans">
      <b>Claim:</b> 4-bit (NF4) quantize base + LoRA adapters in fp16 → fine-tune 65B on a single 48GB GPU.<br>
      <b>Insight:</b> aggressive base-weight quantization + paged optimizers without quality loss.<br>
      <b>Why matters:</b> democratized large-model fine-tuning.<br>
      <b>Memorize:</b> NF4 quantization, double quantization, paged optimizers.
    </div></details>
    <details class="try"><summary>11. DPO (Rafailov 2023)</summary><div class="ans">
      <b>Claim:</b> skip the reward model — derive a closed-form loss directly from preference pairs that achieves PPO-equivalent results.<br>
      <b>Insight:</b> the policy IS its own implicit reward model. Math reformulation eliminates training instability.<br>
      <b>Why matters:</b> replaced PPO as preference-tuning default. Simpler, more stable, no RM to maintain.<br>
      <b>Memorize:</b> L_DPO = -log σ(β·[logπ/π_ref ratios for chosen vs rejected]).
    </div></details>
    <details class="try"><summary>12. RAG (Lewis 2020)</summary><div class="ans">
      <b>Claim:</b> retrieve-then-generate beats parametric memorization for knowledge-intensive tasks.<br>
      <b>Insight:</b> learnable retriever (DPR) + frozen generator (BART) end-to-end.<br>
      <b>Why matters:</b> the founding RAG paper. Modern systems are descendants.<br>
      <b>Memorize:</b> bi-encoder retrieval, augmented generation, knowledge non-staleness.
    </div></details>
    <details class="try"><summary>13. FlashAttention (Dao 2022)</summary><div class="ans">
      <b>Claim:</b> IO-aware attention algorithm — exact same math, much less HBM traffic. 2-4× faster, lower memory.<br>
      <b>Insight:</b> attention is memory-bandwidth bound, not compute bound. Block computation in SRAM saves wasted HBM reads.<br>
      <b>Why matters:</b> standard for modern training/inference. Read if you care about systems perf.<br>
      <b>Memorize:</b> tiling strategy, softmax recomputation in backward, why memory matters more than FLOPs.
    </div></details>
    <details class="try"><summary>14. Mixtral 8x7B (Jiang 2024)</summary><div class="ans">
      <b>Claim:</b> sparse Mixture of Experts — 47B total params but only 13B active per token. Matches Llama-2 70B at 1/4 the cost.<br>
      <b>Insight:</b> route each token to top-2 of 8 expert FFNs. Train router + experts jointly.<br>
      <b>Why matters:</b> MoE became standard for frontier models (GPT-4 rumored, Mixtral, DeepSeek).<br>
      <b>Memorize:</b> sparse activation, router network, load-balancing loss.
    </div></details>
    <details class="try"><summary>15. Anthropic Claude model cards (3 / 3.5 / 4 series)</summary><div class="ans">
      <b>Read:</b> anthropic.com → research → model cards.<br>
      <b>Why matters:</b> shows what an industry-leading lab discloses about capabilities, evals, safety testing, refusal training.<br>
      <b>Memorize:</b> the eval categories Anthropic reports (MMLU, GPQA, HumanEval, HellaSwag, agentic benchmarks).
    </div></details>
    <div class="callout"><b>Reading rhythm:</b> one paper per week. Read summary → read paper → write 1-paragraph notes in your repo's <code>papers/</code> folder → quiz yourself a week later. After 15 papers you can talk credibly with any AI engineer.</div>`},

{ id:"bug-hunt", title:"🐛 Spot the Bug", desc:"Debug short code snippets. Multiple choice fix.", xp:120, type:"bug",
  items:[
    {code:`def softmax(x):\n    e = np.exp(x)\n    return e / e.sum()`,
     question:"Bug? (LLM-relevant)",
     options:["Need to subtract x.max() first for stability","Wrong return statement","Missing import","No bug"],
     answer:0,
     explain:"exp(large) overflows. Subtract max along reducing axis for numerical stability."},
    {code:`# Training loop\nfor xb, yb in loader:\n    logits = model(xb)\n    loss = F.cross_entropy(logits, yb)\n    loss.backward()\n    opt.step()`,
     question:"Bug?",
     options:["Missing model.train()","Missing opt.zero_grad() — grads accumulate across steps","Wrong loss","Bad batch shape"],
     answer:1,
     explain:"PyTorch accumulates grads. Without zero_grad each step, updates compound."},
    {code:`# Causal mask for sequence length T\nmask = torch.ones(T, T)\natt = (q @ k.transpose(-2,-1))\natt = att.masked_fill(mask == 0, float('-inf'))`,
     question:"Bug?",
     options:["Need scale by sqrt(d_k)","mask = torch.tril(torch.ones(T,T)), not torch.ones","Wrong dtype","No bug"],
     answer:1,
     explain:"torch.ones fills with 1s everywhere → mask==0 is empty → no masking. Use tril for lower-triangular causal mask. Also: scaling is separate bug but the question is the mask."},
    {code:`emb = vo.embed(query, model="voyage-3", input_type="document")\nhits = qd.search("docs", query_vector=emb, limit=5)`,
     question:"Bug? (RAG)",
     options:["Use input_type='query' for queries, 'document' is for chunks at ingest","Wrong model","limit too small","No bug"],
     answer:0,
     explain:"Voyage (and Cohere) have separate query/document embeddings. Mismatch hurts retrieval significantly."},

     question:"Bug?",
     options:["No system role in messages list — use top-level system= param","Missing temperature","Wrong model","Token limit"],
     answer:0,
     explain:"Anthropic API: system prompt is a separate top-level parameter, NOT a message role. messages alternates user/assistant only."},
    {code:`# LoRA fine-tune\nbase = AutoModel.from_pretrained("llama-3.2-1b")\nfor p in base.parameters(): p.requires_grad = True\nlora = LoraConfig(r=16, target_modules=["q_proj","v_proj"])\nmodel = get_peft_model(base, lora)`,
     question:"Bug?",
     options:["LoRA expects base weights frozen — setting requires_grad=True fights it","Wrong rank","Wrong modules","No bug"],
     answer:0,
     explain:"LoRA freezes base and trains only adapters. Manually setting requires_grad=True wastes memory and breaks the speed/memory advantage."},
    {code:`# Eval\nmodel.train()\nwith torch.no_grad():\n    for xb, yb in val_loader:\n        out = model(xb)\n        acc.update(out, yb)`,
     question:"Bug?",

     answer:1,
     explain:"During eval, you want deterministic, full-capacity behavior. model.eval() disables dropout and uses running stats for BatchNorm. model.train() gives noisy eval scores."},
    {code:`# Tokenize text and split into train/val\ntoks = tokenizer.encode(text)\ntrain = toks[:int(len(toks)*0.9)]\nval = toks[int(len(toks)*0.9):]\n# Build batches by random sampling indices`,
     question:"Bug for next-token language modeling?",

{ id:"diag-lab", title:"🩺 Diagnostic Lab — system-level failures", desc:"15 scenarios. Read symptom, pick root cause. What senior engineers do 70% of the day.", xp:200, type:"bug",
  items:[
    {code:"Symptom: pretraining loss starts at 10.8, drops to 8.2 by step 1k, plateaus there forever.\nVal loss matches train loss (no overfit).\nGenerated samples look like random tokens.",

     explain:"Single outlier batch produced huge gradient → NaN. Always train LLMs with global grad clip ≤ 1.0. Restart from previous checkpoint with clip enabled."},

/* ============================== STATE ============================== */
const STORAGE_KEY = "ai_zero_to_hero_v2";
let state = loadProgress();
let currentView = "phases";
let currentPhase = 0;
let currentGame = null;

function loadProgress(){
  try{
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (s) {
      // ensure structure
      s.phases = s.phases || {};
      COURSE.forEach(p=>{ if(!s.phases[p.id]) s.phases[p.id] = {complete:false, quiz:{}, checks:{}} });
      s.games = s.games || {};
      s.portfolio = s.portfolio || {};
      s.badges = s.badges || {};
      s.xp = s.xp || 0;
      s.level = s.level || 1;
      s.streak = s.streak || 0;
      s.lastVisit = s.lastVisit || null;
      return s;
    }
  }catch(e){}
  return {
    xp:0, level:1, streak:0, lastVisit:null,
    phases: Object.fromEntries(COURSE.map(p=>[p.id,{complete:false,quiz:{},checks:{}}])),
    games: {},
    portfolio: {},
    badges: {},
  };
}
function saveProgress(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.warn("localStorage full or unavailable:", e); xpPop("⚠ Save failed (storage full)"); }
}
function exportProgress(){
  try{
    const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `ai_course_progress_${new Date().toISOString().slice(0,10)}.json`; a.click();
  }catch(e){ xpPop("⚠ Export failed"); }
}
function validateImported(obj){
  if(!obj || typeof obj !== "object") return null;
  const skeleton = {
    xp: typeof obj.xp === "number" ? obj.xp : 0,
    level: typeof obj.level === "number" ? obj.level : 1,
    streak: typeof obj.streak === "number" ? obj.streak : 0,
    lastVisit: typeof obj.lastVisit === "string" ? obj.lastVisit : null,
    phases: {}, games: {}, portfolio: {}, badges: {},
  };
  COURSE.forEach(p=>{
    const src = obj.phases?.[p.id] || {};
    skeleton.phases[p.id] = {
      complete: !!src.complete,
      quiz: typeof src.quiz === "object" && src.quiz ? src.quiz : {},
      checks: typeof src.checks === "object" && src.checks ? src.checks : {},
    };
  });
  if(obj.games && typeof obj.games === "object") skeleton.games = obj.games;
  if(obj.portfolio && typeof obj.portfolio === "object") skeleton.portfolio = obj.portfolio;
  if(obj.badges && typeof obj.badges === "object") skeleton.badges = obj.badges;
  return skeleton;
}
function recomputeLevel(){
  while(state.xp >= xpTotalForLevel(state.level+1)) state.level++;
}
function importProgress(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const parsed = JSON.parse(e.target.result);
      const clean = validateImported(parsed);
      if(!clean){ xpPop("⚠ Bad file"); return; }
      state = clean;
      recomputeLevel();
      saveProgress(); refreshBadges(); render();
      xpPop("Progress imported");
    } catch(err){ xpPop("⚠ Bad JSON"); }
  };
  r.readAsText(f);
}
function showModal({title, body, okLabel="OK", requireType=null}){
  return new Promise(resolve=>{
    document.getElementById("modal-title").textContent = title;
    document.getElementById("modal-body").textContent = body;
    const extra = document.getElementById("modal-extra");
    const ok = document.getElementById("modal-ok");
    ok.textContent = okLabel;
    extra.innerHTML = "";
    if(requireType){
      extra.innerHTML = `<p style="font-size:13px;color:var(--muted);margin-top:10px">Type <b>${requireType}</b> to confirm:</p><input id="modal-input" type="text" style="width:100%;background:var(--code);border:1px solid var(--border);color:var(--ink);border-radius:6px;padding:8px;font-family:inherit">`;
      ok.disabled = true; ok.style.opacity = "0.5";
      setTimeout(()=>{
        const inp = document.getElementById("modal-input");
        inp.focus();
        inp.addEventListener("input", e=>{
          const match = e.target.value === requireType;
          ok.disabled = !match;
          ok.style.opacity = match ? "1" : "0.5";
        });
      }, 50);
    } else {
      ok.disabled = false; ok.style.opacity = "1";
    }
    const backdrop = document.getElementById("modal-backdrop");
    backdrop.style.display = "flex";
    const close = (val)=>{ backdrop.style.display="none"; ok.onclick=null; document.getElementById("modal-cancel").onclick=null; resolve(val); };
    ok.onclick = ()=>close(true);
    document.getElementById("modal-cancel").onclick = ()=>close(false);
  });
}
async function resetProgress(){
  const ok = await showModal({
    title:"Reset all progress?",
    body:"This permanently deletes your XP, badges, quiz answers, project checks, and portfolio links. Cannot be undone. Export first if you want a backup.",
    okLabel:"Reset everything",
    requireType:"RESET",
  });
  if(!ok) return;
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  state = loadProgress(); render();
  xpPop("Progress reset");
}

/* ============================== XP / LEVELS / STREAK ============================== */
function xpForLevel(L){ return 500 + (L-1)*250; }      // 500, 750, 1000, 1250 ...
function xpTotalForLevel(L){
  let total = 0; for(let i=1;i<L;i++) total += xpForLevel(i); return total;
}
function addXP(amount, reason){
  state.xp += amount;
  // level up?
  while(state.xp >= xpTotalForLevel(state.level+1)){
    state.level++;
    xpPop(`Level up! Lv ${state.level}`);
  }
  saveProgress();
  xpPop(`+${amount} XP${reason?" · "+reason:""}`);
  refreshHeader();
  refreshBadges();
}
function dayKey(d){ return `${d.getUTCFullYear()}-${d.getUTCMonth()}-${d.getUTCDate()}`; }
function updateStreak(){
  const now = new Date();
  const today = dayKey(now);
  if(state.lastVisit !== today){
    if(state.lastVisit){
      const [y,m,d] = state.lastVisit.split("-").map(Number);
      const lastUtc = Date.UTC(y, m, d);
      const todayUtc = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
      const diff = Math.round((todayUtc - lastUtc)/86400000);
      state.streak = (diff === 1) ? (state.streak||0)+1 : 1;
    } else {
      state.streak = 1;
    }
    state.lastVisit = today;
    saveProgress();
  }
}
function xpPop(msg){
  const el = document.getElementById("xp-pop");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 1600);
}
function refreshHeader(){
  document.getElementById("level").textContent = state.level;
  const xpInLvl = state.xp - xpTotalForLevel(state.level);
  const xpNeed = xpForLevel(state.level);
  document.getElementById("xp").textContent = xpInLvl;
  document.getElementById("xp-next").textContent = xpNeed;
  const pct = Math.max(0, Math.min(100, (xpInLvl/xpNeed)*100));
  document.getElementById("xp-bar-fill").style.width = `${pct}%`;
  const bar = document.getElementById("xp-bar");
  if(bar) bar.setAttribute("aria-valuenow", Math.round(pct));
  document.getElementById("streak").textContent = state.streak||0;
  const earned = BADGES.filter(b=>b.check(state)).length;
  document.getElementById("badge-count").textContent = earned;
  document.getElementById("badge-total").textContent = BADGES.length;
}
let refreshingBadges = false;
function refreshBadges(){
  if(refreshingBadges) return;
  refreshingBadges = true;
  try{
    // detect newly-earned (collect first, award after to avoid re-entrancy)
    const newly = [];
    BADGES.forEach(b=>{
      if(b.check(state) && !state.badges[b.id]){
        state.badges[b.id] = Date.now();
        newly.push(b);
      }
    });
    newly.forEach(b=>{
      state.xp += 100;
      xpPop(`🏆 ${b.name} (+100 XP)`);
    });
    recomputeLevel();
    saveProgress();
    refreshHeader();
  } finally {
    refreshingBadges = false;
  }
}

/* --------------------- GAME: MATCH --------------------- */
let matchState = null;
function renderMatch(g){
  if(!matchState || matchState.gameId !== g.id){
    matchState = {gameId:g.id, picked:null, matched:new Set(), wrong:0, left:[], right:[]};
    const lefts = g.pairs.map((p,i)=>({k:"L"+i, val:p[0], idx:i}));
    const rights = g.pairs.map((p,i)=>({k:"R"+i, val:p[1], idx:i}));
    matchState.left = fisherYates(lefts.slice());
    matchState.right = fisherYates(rights.slice());
  }
  const done = matchState.matched.size;
  const total = g.pairs.length;
  const html = `
    <div class="card">
      <div style="display:flex;justify-content:space-between"><span>Matched ${done}/${total}</span><span>Wrong: ${matchState.wrong}</span></div>
      <div class="match-board">
        <div class="match-col">${matchState.left.map(it=>`
          <div class="match-item ${matchState.picked===it.k?'selected':''} ${matchState.matched.has(it.idx)?'matched':''}" onclick="matchClick('${it.k}', ${it.idx})">${escapeHtml(it.val)}</div>
        `).join("")}</div>
        <div class="match-col">${matchState.right.map(it=>`
          <div class="match-item ${matchState.picked===it.k?'selected':''} ${matchState.matched.has(it.idx)?'matched':''}" onclick="matchClick('${it.k}', ${it.idx})">${escapeHtml(it.val)}</div>
        `).join("")}</div>
      </div>
      ${done===total?`<div class="feedback ok" style="margin-top:12px">Complete! Score: ${total} (wrong: ${matchState.wrong})</div><button onclick="finishMatch()" style="background:var(--ok);color:#0b0f17;border:none;border-radius:6px;padding:10px 16px;font-weight:700;margin-top:10px;cursor:pointer">Claim XP & Reset</button>`:""}
    </div>`;
  return html;
}
function matchClick(k, idx){
  const ms = matchState;
  if(!ms) return;
  if(ms.matched.has(idx)) return;  // guard: matched item not clickable
  if(ms.picked===null){ ms.picked = k; renderMain(); return; }
  if(ms.picked===k){ ms.picked = null; renderMain(); return; }
  // pair check: pickedIdx == idx ?
  const pickedIdx = parseInt(ms.picked.slice(1));
  const pickedSide = ms.picked[0];
  const thisSide = k[0];
  if(pickedSide !== thisSide && pickedIdx === idx){
    ms.matched.add(idx);
    ms.picked = null;
  } else {
    ms.wrong++;
    ms.picked = null;
  }
  renderMain();
}
function finishMatch(){
  const g = GAMES[currentGame];
  const score = g.pairs.length;  // perfect
  const prev = state.games[g.id]?.best || 0;
  if(score > prev){
    state.games[g.id] = {best:score, last:Date.now()};
    saveProgress();
    addXP(g.xp, g.title);
  } else {
    xpPop("Practiced. New high not reached.");
  }
  matchState = null;
  refreshBadges();
  render();
}

/* --------------------- GAME: ORDER --------------------- */
let orderState = null;
function renderOrder(g){
  if(!orderState || orderState.gameId !== g.id){
    orderState = {gameId:g.id, items:fisherYates([...g.correct]), submitted:false};
  }
  const correct = g.correct;
  let html = `<div class="card"><div class="order-list" id="order-list">`;
  orderState.items.forEach((it, i)=>{
    let cls = "";
    if(orderState.submitted){
      cls = it === correct[i] ? "correct" : "wrong";
    }
    html += `<div class="order-item ${cls}" draggable="true" data-i="${i}"
      ondragstart="orderDragStart(event, ${i})" ondragover="event.preventDefault()" ondrop="orderDrop(event, ${i})">
      <span class="num">${i+1}</span> ${escapeHtml(it)}
    </div>`;
  });
  html += `</div>`;
  if(!orderState.submitted){
    html += `<div class="actions" style="margin-top:10px"><button onclick="orderSubmit()" style="background:var(--accent);color:#0b0f17;border:none;border-radius:6px;padding:8px 14px;font-weight:600;cursor:pointer">Submit Order</button> <button onclick="orderShuffle()" style="background:var(--panel2);color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer">Shuffle</button></div>`;
  } else {
    const okCount = orderState.items.filter((it,i)=>it===correct[i]).length;
    const total = correct.length;
    html += `<div class="feedback ${okCount===total?'ok':'info'}" style="margin-top:10px">${okCount}/${total} correct positions.<br>${okCount<total?'Hints: red items are in wrong slot. Try again.':'Perfect! +' + g.xp + ' XP'}</div>`;
    html += `<button onclick="orderReset()" style="background:var(--ok);color:#0b0f17;border:none;border-radius:6px;padding:8px 14px;font-weight:700;cursor:pointer;margin-top:8px">${okCount===total?'Claim XP & Replay':'Try Again'}</button>`;
  }
  html += `</div>`;
  return html;
}
let dragFrom = null;
function orderDragStart(e, i){ dragFrom = i; e.dataTransfer.effectAllowed = "move"; }
function orderDrop(e, i){
  e.preventDefault();
  if(dragFrom===null || dragFrom===i) return;
  const arr = orderState.items;
  const [moved] = arr.splice(dragFrom, 1);
  arr.splice(i, 0, moved);
  dragFrom = null;
  renderMain();
}
function fisherYates(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function orderShuffle(){ fisherYates(orderState.items); orderState.submitted = false; renderMain(); }
function orderSubmit(){ orderState.submitted = true; renderMain(); }
function orderReset(){
  const g = GAMES[currentGame];
  const okCount = orderState.items.filter((it,i)=>it===g.correct[i]).length;
  if(okCount===g.correct.length){
    const prev = state.games[g.id]?.best || 0;
    if(1 > prev){
      state.games[g.id] = {best:1, last:Date.now()};
      saveProgress();
      addXP(g.xp, g.title);
    }
    refreshBadges();
  }
  orderState = null;
  renderMain();
}

/* --------------------- GAME: TOKEN LAB --------------------- */
const GPT2_MERGES = [
  ["t","h","th"],["h","e","he"],["i","n","in"],["e","r","er"],["a","n","an"],
  ["r","e","re"],["o","n","on"],["a","t","at"],["e","n","en"],["n","d","nd"],
  ["o","r","or"],["e","s","es"],["i","s","is"],["i","t","it"],["a","r","ar"],
  ["t","e","te"],["s","t","st"],["e","d","ed"],["l","e","le"],["o","u","ou"],
  ["a","l","al"],["s","e","se"],["a","s","as"],["t","i","ti"],["o","f","of"],
  ["m","e","me"],["d","e","de"],["t","o","to"],["b","e","be"],["w","e","we"],
  [" ","t"," t"],[" ","a"," a"],[" ","s"," s"],[" ","i"," i"],[" ","o"," o"],
  [" ","w"," w"],[" ","c"," c"],[" ","b"," b"],[" ","p"," p"],[" ","m"," m"],
  [" ","d"," d"],[" ","f"," f"],[" ","h"," h"],[" ","l"," l"],[" ","n"," n"],
  [" t","he"," the"],[" a","nd"," and"],[" o","f"," of"],[" t","o"," to"],
  [" i","n"," in"],[" i","s"," is"],[" i","t"," it"],[" w","as"," was"],
  [" w","ith"," with"],[" t","hat"," that"],[" f","or"," for"],[" b","e"," be"],
  ["th","e","the"],["an","d","and"],["in","g","ing"],
];
function applyMerges(toks, merges){
  for(const [a, b, c] of merges){
    const out = []; let i = 0;
    while(i < toks.length){
      if(i < toks.length-1 && toks[i]===a && toks[i+1]===b){ out.push(c); i+=2; }
      else { out.push(toks[i]); i++; }
    }
    toks = out;
  }
  return toks;
}
function tokLabBpe(text, mode){
  if(mode === "gpt2"){
    return {toks: applyMerges(Array.from(text), GPT2_MERGES), merges: GPT2_MERGES.slice()};
  }
  return tokLabBpeLearned(text);
}
function tokLabBpeLearned(text){
  // Learn merges from the actual input (toy BPE), then apply.
  let toks = Array.from(text);
  const merges = [];
  const targetMerges = Math.min(20, Math.max(0, Math.floor(text.length/3)));
  for(let m = 0; m < targetMerges; m++){
    const counts = new Map();
    for(let i = 0; i < toks.length-1; i++){
      const k = toks[i] + "␀" + toks[i+1];
      counts.set(k, (counts.get(k)||0) + 1);
    }
    if(!counts.size) break;
    let best = null, bestN = 0;
    for(const [k, n] of counts){
      if(n > bestN){ best = k; bestN = n; }
    }
    if(bestN < 2) break;
    const [a, b] = best.split("␀");
    const merged = a + b;
    merges.push([a, b, merged]);
    const out = []; let i = 0;
    while(i < toks.length){
      if(i < toks.length-1 && toks[i]===a && toks[i+1]===b){ out.push(merged); i+=2; }
      else { out.push(toks[i]); i++; }
    }
    toks = out;
  }
  return {toks, merges};
}
function tokLabPaint(){
  const text = document.getElementById("tok-input")?.value ?? "the cat sat on the mat";
  const mode = document.querySelector('input[name="tok-mode"]:checked')?.value || "learn";
  const {toks, merges} = tokLabBpe(text, mode);
  const colors = ["#7aa2ff","#9d7aff","#ffd166","#3ecf8e","#ffb547","#ff6b6b","#7ad4ff"];
  const out = document.getElementById("tok-out");

  const stat = document.getElementById("tok-stat");
  if(stat) stat.textContent = `${toks.length} tokens · ${text.length} chars · ${merges.length} learned merges`;
  const merg = document.getElementById("tok-merges");
  if(merg) merg.textContent = merges.length ? merges.map(([a,b])=>`(${a})+(${b})`).join("  ") : "(input too short for merges)";
}

/* --------------------- GAME: ATTENTION TOY --------------------- */
const ATTN_TOKENS = ["The","cat","sat","mat"];
function attnDefaults(){ return [[3,1,1,1],[2,3,2,1],[1,2,3,2],[1,1,1,3]]; }
function attnComputeWeights(s, dk, causal){
  return s.map((row, i)=>{
    const scaled = row.map((v, j)=>(causal && j>i) ? -Infinity : v/Math.sqrt(dk));
    const m = Math.max(...scaled.filter(x=>x!==-Infinity), 0);
    const e = scaled.map(v=>v===-Infinity ? 0 : Math.exp(v-m));
    const z = e.reduce((a,b)=>a+b,0) || 1;
    return e.map(v=>v/z);
  });
}
function attnPaint(){
  const cur = state.games["attention-toy"]?.scores || attnDefaults();
  const dk = parseFloat(document.getElementById("attn-dk")?.value) || 4;
  const causal = document.getElementById("attn-causal")?.checked || false;
  const w = attnComputeWeights(cur, dk, causal);
  const out = document.getElementById("attn-grid");
  if(!out) return;
  out.innerHTML = `<div></div>${ATTN_TOKENS.map(t=>`<div class="attn-cell" style="font-weight:600">${t}</div>`).join("")}` +
    ATTN_TOKENS.map((t,i)=>`<div class="attn-cell" style="font-weight:600">${t}</div>` + w[i].map(v=>`<div class="attn-cell" style="background:rgba(122,162,255,${v*0.9+0.05});color:${v>0.4?'#0b0f17':'#e6ecf5'}">${(v*100).toFixed(0)}%</div>`).join("")).join("");
}
function attnInput(i, j, v){
  const cur = state.games["attention-toy"]?.scores || attnDefaults();
  cur[i][j] = parseFloat(v)||0;
  state.games["attention-toy"] = {...(state.games["attention-toy"]||{}), scores:cur};
  try{ saveProgress(); }catch(e){}
  if(!state.games["attention-toy"].claimed){
    state.games["attention-toy"].claimed = true;
    addXP(GAMES.find(g=>g.id==="attention-toy").xp, "Attention Toy");
    refreshBadges();
  }
  attnPaint();
}
function renderAttentionToy(){
  const s = state.games["attention-toy"]?.scores || attnDefaults();
  setTimeout(attnPaint, 0);
  return `<div class="card">
    <p>Set raw similarity scores Q·Kᵀ for 4 tokens. We scale by √d_k and apply softmax. Toggle causal mask (decoder LLM).</p>
    <div style="display:flex;gap:14px;align-items:center;margin:8px 0;flex-wrap:wrap">
      <label style="font-size:12px;color:var(--muted)">d_k <input id="attn-dk" type="number" value="4" min="1" max="1024" step="1" oninput="attnPaint()" style="width:60px;background:var(--code);border:1px solid var(--border);color:var(--ink);border-radius:4px;padding:4px"></label>
      <label style="font-size:12px;color:var(--muted)"><input id="attn-causal" type="checkbox" oninput="attnPaint()"> causal mask</label>
    </div>
    <table style="margin-top:10px"><caption style="text-align:left;font-size:12px;color:var(--muted);margin-bottom:4px">Score matrix (rows = query token, cols = key token)</caption><tr><th></th>${ATTN_TOKENS.map(t=>`<th>${t}</th>`).join("")}</tr>
    ${ATTN_TOKENS.map((t,i)=>`<tr><td><b>${t}</b></td>${ATTN_TOKENS.map((_,j)=>`<td><label class="sr-only" for="attn-${i}-${j}">${t}→${ATTN_TOKENS[j]}</label><input id="attn-${i}-${j}" type="number" step="0.5" value="${s[i][j]}" style="width:50px;background:var(--code);border:1px solid var(--border);color:var(--ink);border-radius:4px;padding:4px" oninput="attnInput(${i},${j},this.value)"></td>`).join("")}</tr>`).join("")}
    </table>
    <h4 style="margin-top:14px">After softmax(score/√d_k) [+mask]:</h4>
    <div id="attn-grid" class="attn-grid" style="grid-template-columns:80px repeat(${ATTN_TOKENS.length},1fr)"></div>
    <div style="margin-top:10px;font-size:12px;color:var(--muted)">Each row sums to 100%. Try: row 0 = (10,0,0,0) → near one-hot. Increase d_k → softer attention. Causal: future positions zeroed.</div>
  </div>
  <div class="callout">Real transformers: d=64+ per head, learned Q/K projections from input, multi-head, 12-100+ layers. Same math.</div>`;
}

function paramCalc(){
  const dEl = document.getElementById("pc-d");
  if(!dEl) return;
  const d = +dEl.value;
  const n = +document.getElementById("pc-n").value;
  const v = +document.getElementById("pc-v").value;

  document.getElementById("pc-out").innerHTML =
    `Per-block params: ${fmt(perBlock)}<br>` +
    `All blocks (n=${n}): ${fmt(blockTotal)}<br>` +
    `Embedding table (vocab·d): ${fmt(emb)}<br>` +
    `<b style="color:var(--gold)">Total: ${fmt(total)} (${(total/1e6).toFixed(1)}M)</b>`;
}

/* --------------------- GAME: GRADIENT DESCENT SIM --------------------- */
function renderGdSim(){
  setTimeout(gdRun, 0);
  return `<div class="card">
    <p>Function: <code>f(x) = x² − 4x + 5</code>. Minimum at x=2 (where f=1).</p>
    <p>Gradient descent: <code>x ← x − lr · f'(x)</code> where <code>f'(x) = 2x − 4</code>.</p>
    <div class="minilab">
      <label>Start x₀: <input id="gd-x0" type="number" value="-3" step="0.5" oninput="gdRun()"></label>
      <label>Learning rate: <input id="gd-lr" type="number" value="0.1" step="0.05" min="0.01" max="2" oninput="gdRun()"></label>
      <label>Steps: <input id="gd-steps" type="number" value="20" min="1" max="200" oninput="gdRun()"></label>
      <div id="gd-out" class="out" style="white-space:pre-wrap"></div>
      <canvas id="gd-canvas" width="600" height="200" style="width:100%;background:var(--code);border-radius:6px;margin-top:10px"></canvas>
    </div>
    <p><b>Experiments to try:</b></p>
    <ul>
      <li>LR=0.1, start=-3: smooth convergence to x=2. Healthy.</li>
      <li>LR=0.01: too slow — many steps, barely moves.</li>
      <li>LR=1.0: oscillates around minimum, eventually settles.</li>
      <li>LR=1.5: <b>diverges</b> — overshoots, x blows up. This is what "LR too high" looks like in real training.</li>
      <li>LR=2.0+: explodes immediately.</li>
    </ul>
  </div>
  <div class="callout">Real LLM training tunes LR with cosine schedule. Same principle — too high = NaN, too low = wasted compute.</div>`;
}
function gdRun(){
  const x0 = parseFloat(document.getElementById("gd-x0")?.value) || -3;
  const lr = parseFloat(document.getElementById("gd-lr")?.value) || 0.1;
  const steps = parseInt(document.getElementById("gd-steps")?.value) || 20;
  const f = x => x*x - 4*x + 5;
  const grad = x => 2*x - 4;
  const trail = [{x:x0, f:f(x0)}];
  let x = x0;
  for(let i = 0; i < steps; i++){
    x = x - lr * grad(x);
    if(!isFinite(x) || Math.abs(x) > 1e6){ trail.push({x, f:NaN, diverged:true}); break; }
    trail.push({x, f:f(x)});
  }
  const last = trail[trail.length-1];
  const out = document.getElementById("gd-out");
  if(out){
    out.innerHTML = trail.slice(0,8).map((p,i)=>`step ${i}: x=${p.x.toFixed(3)} f=${isNaN(p.f)?"DIVERGED":p.f.toFixed(4)}`).join("\\n") + (trail.length>8?`\\n... (showing first 8 of ${trail.length-1} steps)`:"") + `\\n\\nFinal: x=${last.x.toFixed(3)}, distance from min(x=2): ${Math.abs(last.x-2).toFixed(3)}`;
  }
  // canvas: plot f over [-2, 6] and trail dots
  const c = document.getElementById("gd-canvas");
  if(!c) return;
  const ctx = c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  const xMin = -2, xMax = 6, yMin = 0, yMax = 25;
  const X = v => (v - xMin)/(xMax - xMin) * c.width;
  const Y = v => c.height - (v - yMin)/(yMax - yMin) * c.height;
  // axis
  ctx.strokeStyle = "#23304a"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, Y(0)); ctx.lineTo(c.width, Y(0)); ctx.stroke();
  // curve
  ctx.strokeStyle = "#7aa2ff"; ctx.lineWidth = 2;
  ctx.beginPath();
  for(let v = xMin; v <= xMax; v += 0.05){
    const px = X(v), py = Y(f(v));
    if(v === xMin) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  // minimum marker
  ctx.fillStyle = "#3ecf8e";
  ctx.beginPath(); ctx.arc(X(2), Y(1), 4, 0, 2*Math.PI); ctx.fill();
  // trail
  trail.forEach((p, i)=>{
    if(!isFinite(p.x)) return;
    const px = Math.max(0, Math.min(c.width, X(p.x)));
    const py = Math.max(0, Math.min(c.height, Y(p.f)));
    ctx.fillStyle = `rgba(255, 209, 102, ${0.3 + 0.7*i/trail.length})`;
    ctx.beginPath(); ctx.arc(px, py, 4, 0, 2*Math.PI); ctx.fill();
  });
  // claim XP on first interaction
  if(!state.games["gd-sim"]?.claimed){
    state.games["gd-sim"] = {claimed:true};
    try{ saveProgress(); }catch(e){}
    addXP(GAMES.find(g=>g.id==="gd-sim").xp, "Gradient Descent Sim");
    refreshBadges();
  }
}

function copyPre(btn){
  const code = btn.parentElement.querySelector("code").innerText;

function submitMCQ(i, correctIdx){
  const sel = document.querySelector(`input[name="q${i}"]:checked`);
  if(!sel){ xpPop("Pick an answer first"); return; }
  const choice = parseInt(sel.value);
  const ps = state.phases[COURSE[currentPhase].id];
  const wasCorrect = ps.quiz[i]?.correct;
  ps.quiz[i] = {choice, correct: choice===correctIdx, feedback:true};
  saveProgress();
  if(choice===correctIdx && !wasCorrect) addXP(10, "Correct answer");
  refreshBadges();
  renderMain();
}
function saveShort(i){
  const txt = document.getElementById(`short-${i}`).value;
  const ps = state.phases[COURSE[currentPhase].id];
  ps.quiz[i] = {...ps.quiz[i], text:txt};
  saveProgress();
}

  saveShort(i);
  const ps = state.phases[COURSE[currentPhase].id];
  ps.quiz[i] = {...ps.quiz[i], shown:true};
  saveProgress(); renderMain();
}

  const ps = state.phases[COURSE[currentPhase].id];
  const wasOk = ps.quiz[i]?.selfGraded;
  ps.quiz[i] = {...ps.quiz[i], selfGraded:ok, shown:true};
  saveProgress();
  if(ok && !wasOk) addXP(15, "Self-graded correct");
  refreshBadges();
  renderMain();
}
function toggleCheck(i, checked){
  const ps = state.phases[COURSE[currentPhase].id];
  const had = !!ps.checks[i];
  ps.checks[i] = checked;
  saveProgress();
  if(checked && !had) addXP(25, "Project step");
  refreshBadges();

function markComplete(passed){
  if(!passed){ xpPop("Score 70%+ on quiz first"); return; }
  const ps = state.phases[COURSE[currentPhase].id];
  if(ps.complete) return;
  ps.complete = true;
  saveProgress();
  addXP(200, "Phase complete");
  refreshBadges();
  render();
}
